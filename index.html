<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numen Kolektif</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: #000;
      height: 100vh;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: url('background.jpeg') center center / cover no-repeat;
      z-index: 0;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 20, 0.45);
      z-index: 1;
    }

    /* DİL SEÇİCİ */
    .lang-switcher {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 100;
      display: flex;
      gap: 6px;
    }

    .lang-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.6);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 13px;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn:hover, .lang-btn.active {
      border-color: white;
      color: white;
      background: rgba(255,255,255,0.1);
    }

    /* LOGO */
    .site-logo-wrap {
      position: fixed;
      top: 16px;
      left: 24px;
      z-index: 100;
    }

    .site-logo-wrap img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      background: rgba(255,255,255,0.92);
      border-radius: 6px;
      padding: 4px;
    }

    /* MERKEZ */
    .center-wrap {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .menu-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    /* HAMBURGER */
    .menu-trigger {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      z-index: 2;
      position: relative;
    }

    .menu-trigger-line {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.85);
      transition: all 0.3s;
      transform-origin: center;
    }

    .menu-trigger-text {
      color: white;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }

    .menu-trigger.open .menu-trigger-line:nth-child(1) { transform: translateY(9px) rotate(45deg); }
    .menu-trigger.open .menu-trigger-line:nth-child(2) { opacity: 0; }
    .menu-trigger.open .menu-trigger-line:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }
    .menu-trigger.open .menu-trigger-text { opacity: 0; }

    /* MENÜ ÖĞELERİ — flex row, ortada konumlanır */
    .menu-items {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: 0;
      pointer-events: none;
    }

    .menu-item {
      opacity: 0;
      transform: translateX(0) translateY(20px);
      transition: opacity 0.35s, transform 0.35s;
      flex: 1;
      max-width: 220px;
      text-align: center;
    }

    .menu-item a {
      display: inline-block;
      color: white;
      text-decoration: none;
      font-size: clamp(13px, 1.8vw, 18px);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 8px;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .menu-item a:hover {
      border-bottom-color: #E07B00;
      color: #f0d090;
    }

    /* AÇIK HAL */
    .menu-container.open .menu-items {
      pointer-events: all;
    }

    .menu-container.open .menu-item:nth-child(1) {
      opacity: 1;
      transform: translateX(0) translateY(0);
      transition-delay: 0s;
    }
    .menu-container.open .menu-item:nth-child(2) {
      opacity: 1;
      transform: translateX(0) translateY(0);
      transition-delay: 0.07s;
    }
    .menu-container.open .menu-item:nth-child(3) {
      opacity: 1;
      transform: translateX(0) translateY(0);
      transition-delay: 0.14s;
    }
    .menu-container.open .menu-item:nth-child(4) {
      opacity: 1;
      transform: translateX(0) translateY(0);
      transition-delay: 0.21s;
    }

    /* MOBİL: dikey aç */
    @media (max-width: 576px) {
      .menu-items {
        flex-direction: column;
        gap: 4px;
        top: 50%;
        transform: translateY(-50%);
        width: auto;
      }

      .menu-item {
        max-width: none;
        transform: translateY(20px);
      }

      .menu-container.open .menu-item:nth-child(1),
      .menu-container.open .menu-item:nth-child(2),
      .menu-container.open .menu-item:nth-child(3),
      .menu-container.open .menu-item:nth-child(4) {
        transform: translateX(0) translateY(0);
      }

      .menu-trigger {
        display: none;
      }

      .menu-items {
        pointer-events: all;
        opacity: 1;
      }

      .menu-item {
        opacity: 1;
        transform: none;
      }

      .site-logo-wrap img { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="bg-overlay"></div>

  <div class="site-logo-wrap">
    <img src="Logo .jpeg" alt="Numen Kolektif">
  </div>

  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('tr', this)">TR</button>
    <button class="lang-btn" onclick="setLang('en', this)">EN</button>
  </div>

  <div class="center-wrap">
    <div class="menu-container" id="menuContainer">

      <div class="menu-items">
        <div class="menu-item">
          <a href="hikayemiz.html" data-tr="Hikayemiz" data-en="Our Story">Hikayemiz</a>
        </div>
        <div class="menu-item">
          <a href="sezon.html" data-tr="2026 / 2027 Sezonu" data-en="2026 / 2027 Season">2026 / 2027 Sezonu</a>
        </div>
        <div class="menu-item">
          <a href="sanatcilar.html" data-tr="Sanatçılar" data-en="Artists">Sanatçılar</a>
        </div>
        <div class="menu-item">
          <a href="medya.html" data-tr="Medya" data-en="Media">Medya</a>
        </div>
      </div>

      <div class="menu-trigger" id="menuTrigger" onclick="toggleMenu()">
        <div class="menu-trigger-line"></div>
        <div class="menu-trigger-line"></div>
        <div class="menu-trigger-line"></div>
        <div class="menu-trigger-text" data-tr="MENÜ" data-en="MENU">MENÜ</div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggleMenu() {
      const container = document.getElementById('menuContainer');
      const trigger = document.getElementById('menuTrigger');
      container.classList.toggle('open');
      trigger.classList.toggle('open');
    }

    function setLang(lang, btn) {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('[data-tr]').forEach(el => {
        el.textContent = el.getAttribute('data-' + lang);
      });
      document.documentElement.lang = lang;
    }
  </script>

</body>
</html>
