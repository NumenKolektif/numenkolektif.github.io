<!DOCTYPE html>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cormorant Garamond', Georgia, serif; background: #F5F3EE; color: #1a1a1a; position: relative; }

    /* ── HEADER — sezon.html ile birebir aynı ── */
    .site-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: transparent;
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      z-index: 10;
    }

    .logo-group {
      display: flex; align-items: center; gap: 16px;
      flex-shrink: 0; text-decoration: none;
    }

    .site-logo {
      width: 120px; height: 120px; object-fit: contain;
      background: transparent; border-radius: 0; padding: 0;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
    }

    .site-name {
      color: white; font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px; font-weight: 600; letter-spacing: 0.06em;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    }

    .header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

    .lang-switcher { display: flex; gap: 6px; }

    .lang-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.6);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 13px; letter-spacing: 0.12em;
      padding: 4px 10px; border-radius: 3px; cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn:hover, .lang-btn.active {
      border-color: white; color: white; background: rgba(255,255,255,0.1);
    }

    .nav-tabs { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .tab {
      padding: 10px 20px; color: #1E2D7A; font-size: 15px; font-weight: 600;
      font-family: 'Cormorant Garamond', Georgia, serif;
      cursor: pointer; border: none; background: #C8D8FF; border-radius: 6px;
      letter-spacing: 0.04em; box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      white-space: nowrap; transition: background 0.15s;
      text-decoration: none; display: inline-block;
    }
    .tab:hover { background: #DDEAFF; }
    .tab.active {
      background: #DDEAFF; border-bottom: 3px solid #E07B00;
      border-radius: 6px 6px 3px 3px;
    }

    /* ── HERO — sezon.html ile birebir aynı ── */
    .hero-band {
      width: 100%; height: 420px;
      background: #1E2D7A url('background.jpeg') center 15% / cover no-repeat;
    }

    /* ── İÇERİK ── */
    .content-area { max-width: 960px; margin: 0 auto; padding: 48px 40px; }

    .page-title {
      font-size: 13px; color: #1E2D7A; text-transform: uppercase;
      letter-spacing: 0.14em; font-weight: 700;
      border-left: 3px solid #C0392B; padding-left: 12px; margin-bottom: 32px;
    }

    .alt-tabs { display: flex; gap: 12px; margin-bottom: 40px; flex-wrap: wrap; }
    .alt-btn {
      padding: 12px 28px; font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 16px; font-weight: 600; letter-spacing: 0.06em;
      cursor: pointer; border: 2px solid #1E2D7A; border-radius: 6px;
      background: transparent; color: #1E2D7A; transition: all 0.2s;
    }
    .alt-btn:hover, .alt-btn.active { background: #1E2D7A; color: white; }

    .panel { display: none; }
    .panel.active { display: block; }

    .sanatci-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 32px; }

    .sanatci-kart {
      background: white; border-radius: 8px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); cursor: pointer; transition: box-shadow 0.2s;
    }
    .sanatci-kart:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.15); }

    .kart-foto { width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: top; display: block; }
    .kart-foto-placeholder { width: 100%; aspect-ratio: 3/4; background: #e8e4dc; display: flex; align-items: center; justify-content: center; color: #999; font-size: 13px; }

    .kart-bilgi { padding: 16px 20px; }
    .kart-ad { font-size: 20px; font-weight: 600; color: #1E2D7A; margin-bottom: 4px; }
    .kart-enstruman { font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: #C0392B; }

    /* ── MODAL ── */
    .nk-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 1000;
      align-items: flex-start; justify-content: center;
      padding: 40px 20px; overflow-y: auto;
    }
    .nk-modal-overlay.open { display: flex; }
    .nk-modal { background: #F5F3EE; border-radius: 10px; max-width: 760px; width: 100%; overflow: hidden; position: relative; }
    .nk-modal-kapat {
      position: absolute; top: 16px; right: 16px; background: #1E2D7A;
      color: white; border: none; width: 32px; height: 32px;
      border-radius: 50%; font-size: 18px; cursor: pointer; line-height: 32px; text-align: center; z-index: 10;
    }
    .nk-modal-ust { display: flex; }
    .nk-modal-foto { width: 240px; flex-shrink: 0; object-fit: cover; object-position: top; }
    .nk-modal-foto-placeholder { width: 240px; flex-shrink: 0; background: #e8e4dc; display: flex; align-items: center; justify-content: center; color: #999; font-size: 13px; min-height: 300px; }
    .nk-modal-baslik { padding: 28px 32px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .nk-modal-ad { font-size: 28px; font-weight: 700; color: #1E2D7A; margin-bottom: 6px; }
    .nk-modal-enstruman { font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: #C0392B; }
    .nk-modal-biyografi { padding: 24px 32px; border-top: 1px solid #e0dbd2; }
    .nk-modal-biyografi p { font-size: 16px; line-height: 1.85; color: #2a2a2a; margin-bottom: 12px; }
    .nk-modal-biyografi p:last-child { margin-bottom: 0; }

    /* ── FOOTER ── */
    .site-footer { background: #1E2D7A; padding: 24px 40px; margin-top: 48px; }
    .footer-contacts { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
    .contact-row { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.8); font-size: 15px; text-decoration: none; }
    .contact-row:hover { color: white; }
    .contact-icon { width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .icon-gmail { background: white; }
    .icon-instagram { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .icon-spotify { background: #1DB954; }

    /* ── MOBİL ── */
    @media (max-width: 640px) {
      .site-header { padding: 14px 20px; flex-direction: column; align-items: flex-start; }
      .site-logo { width: 100px; height: 100px; }
      .site-name { font-size: 22px; }
      .nav-tabs { width: 100%; }
      .tab { padding: 8px 14px; font-size: 13px; }
      .hero-band { height: 200px; }
      .content-area { padding: 32px 20px; }
      .sanatci-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
      .nk-modal-ust { flex-direction: column; }
      .nk-modal-foto, .nk-modal-foto-placeholder { width: 100%; min-height: 280px; }
      .site-footer { padding: 20px; }
    }
  </style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let currentLang = 'tr';

const icracilar = [
  { ad: "İdil Yunkuş", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/idil_yunkus.jpg",
    bio_tr: "İdil Yunkuş, keman eğitimine beş yaşında babası Selahattin Yunkuş ile başlamış, Mersin Üniversitesi Devlet Konservatuvarı'nda Lily Tchumburidze ile devam etmiş ve 2017 yılında Profesör Çiğdem İyicil'in sınıfında lise eğitimini Mimar Sinan Güzel Sanatlar Üniversitesi İstanbul Devlet Konservatuvarı'nda tamamlamıştır. Amsterdam Konservatuarı'nın hazırlık sınıfında Ilya Grubert ile çalışmış, ardından eğitimini Lahey Kraliyet Konservatuvarı'nda Theodora Geraets ve Janet Krause ile sürdürmüş ve 2023 yılında üstün dereceyle mezun olmuştur.<br><br>Kariyeri boyunca Cihat Aşkın, Anna Schnarch, Schlomo Mintz, Alexander Kagan, Mikhail Gotsdiner, Dora Schwarzberg ve Stephan Jackiw gibi dünyaca ünlü kemancıların ustalık sınıflarına katılmıştır. İstanbul Devlet Senfoni Orkestrası, Eskişehir Büyükşehir Belediyesi Senfoni Orkestrası, Bursa Bölge Devlet Senfoni Orkestrası ve Hacettepe Üniversitesi Devlet Konservatuvarı Senfoni Orkestrası eşliğinde Stravinsky, Mendelssohn, Vieuxtemps ve Erkin'in keman konçertolarını solist olarak seslendirmiştir.<br><br>2014–2022 yılları arasında Doğuş Çocuk Senfoni Orkestrası (DÇSO) ve Türkiye Gençlik Filarmoni Orkestrası (TUGFO) kamplarına düzenli olarak katılmış ve başkemancılık görevini üstlenmiştir. 2023 yılı Kış Kampı kapsamında Hollanda Ulusal Gençlik Orkestrası'nın başkemancısı seçilmiş ve şef Antony Hermus ile birlikte ülkenin prestijli salonlarında sahne almıştır.<br><br>2022 yılında Ciconia Yaylı Orkestrası'na daimi üye olarak seçilen Yunkuş, günümüzde ABO Trio ve Orochi Oda Müziği Topluluğu'nun kurucu üyeleri arasında yer almakta ve aktif oda müzisyeni olarak çalışmalarını sürdürmektedir.<br><br>Eylül 2023'te Keep an Eye Vakfı tarafından 'Yılın Genç Müzisyeni' ödülüne, Eylül 2024'te ise Het Kerstjes Kurumu tarafından 'Hollanda Keman Bursu' ödülüne layık görülmüştür. Doğuş Holding desteğiyle lisans eğitimini tamamlayan sanatçı, Dr. Nejat Eczacıbaşı Müzik Bursiyeri olarak Hollanda'da Janet Krause ile sürdürdüğü yüksek lisansını 2025 Haziran'ında cum laude derecesiyle tamamlamıştır. Mart 2024 itibarıyla Hollanda Müzik Enstrümanları Fonu (NMF) tarafından kendisine verilen 1800 yapımı Johannes Cuypers keman ile çalmaktadır.",
    bio_en: "İdil Yunkuş began her violin studies at the age of five with her father Selahattin Yunkuş, continued at Mersin University State Conservatory with Lily Tchumburidze, and completed her secondary education in 2017 in the class of Professor Çiğdem İyicil at Mimar Sinan Fine Arts University Istanbul State Conservatory. She studied in the preparatory programme at the Amsterdam Conservatory with Ilya Grubert, then continued her training at the Royal Conservatoire of The Hague with Theodora Geraets and Janet Krause, graduating with distinction in 2023.<br><br>Throughout her career she has participated in masterclasses given by internationally renowned violinists including Cihat Aşkın, Anna Schnarch, Shlomo Mintz, Alexander Kagan, Mikhail Gotsdiner, Dora Schwarzberg and Stephan Jackiw. She has performed as soloist with the Istanbul State Symphony Orchestra, Eskişehir Metropolitan Municipality Symphony Orchestra, Bursa Regional State Symphony Orchestra and Hacettepe University State Conservatory Symphony Orchestra, performing concertos by Stravinsky, Mendelssohn, Vieuxtemps and Erkin.<br><br>Between 2014 and 2022 she regularly attended the camps of the Doğuş Children's Symphony Orchestra (DÇSO) and the Turkey Youth Philharmonic Orchestra (TUGFO), serving as concertmaster. In the 2023 Winter Camp she was selected as concertmaster of the Netherlands National Youth Orchestra and performed in the country's leading concert halls under conductor Antony Hermus.<br><br>Selected as a permanent member of the Ciconia String Orchestra in 2022, Yunkuş is today a founding member of ABO Trio and the Orochi Chamber Music Ensemble, and continues to pursue an active career as a chamber musician.<br><br>In September 2023 she was awarded the Keep an Eye Foundation's 'Young Musician of the Year' prize, and in September 2024 the 'Netherlands Violin Scholarship' by Het Kerstjes Foundation. Having completed her undergraduate studies with the support of Doğuş Holding, she holds a Dr. Nejat Eczacıbaşı Music Scholarship and completed her master's degree in the Netherlands under Janet Krause cum laude in June 2025. Since March 2024 she plays on an 1800 Johannes Cuypers violin kindly loaned by the Netherlands Musical Instruments Foundation (NMF)." },
 { ad: "Sofiko Tchumburidze", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/sofiko_tchumburidze.jpg",
    bio_tr: "2000 yılında Türkiye'nin Mersin şehrinde Gürcü müzisyen bir ailenin çocuğu olarak dünyaya gelen Sofiko Tchumburidze, keman eğitimine Mersin Üniversitesi Devlet Konservatuarı'nda annesi Lily Tchumburidze ile başlamıştır. Hochschule für Musik und Theater München'deki lisans eğitimine 2018 yılında önce Prof. Lena Neudauer ile başlayan ve Prof. Julia Fischer'ın öğrencisi olarak tamamlayan Tchumburidze, yüksek lisans eğitimini yine Prof. Julia Fischer'ın öğrencisi olarak, Barok Keman lisans eğitimini ise Prof. Mary Utiger ile sürdürmektedir.<br><br>Lukas David, Nora Chastain, Rudens Turku, Volker Jacobsen, Sergey Kravchenko, Dora Schwarzberg, Pierre Amoyal, Mayumi Hirasaki, Cihat Aşkın, Özcan Ulucan ve Dimitri Sitkovetsky'nin ustalık sınıflarına katılan kemancının sanatsal faaliyetlerinde oda müziği önemli bir yer tutmaktadır. Solist performanslarının yanı sıra oda müziği sanatçısı olarak İstanbul Boğaziçi Albert Long Hall Oda Müziği Festivali'nde, Hochschule für Musik und Theatre München'in Oda Müziği Günleri'nde ve prestijli Schloss Elmau Oda Müziği Festivali'nde sahne alan Tchumburidze'nin oda müziği performanslarından bazıları Bayerischer Rundfunk Radyo Kanalı tarafından kaydedilmiştir.<br><br>Sofiko ayrıca Türkiye Cumhuriyeti Cumhurbaşkanlığı Senfoni Orkestrası, Innsbruck Üniversite Orkestrası, Çukurova Devlet Senfoni Orkestrası, Bursa Devlet Senfoni Orkestrası, Eskişehir Senfoni Orkestrası, Karşıyaka Oda Orkestrası ve Antalya Senfoni Orkestrası gibi orkestralarla solist olarak sahne almış; Youth Classics Festival, Semmering International Summer Festival, İstanbul Genç Klasikçiler Festivali, Seefeld Starnberger Müzik Günleri, Salzburg Festivali, Tsinandali Festivali ve Insel Festivali dahil olmak üzere İsviçre, Avusturya, Türkiye ve Almanya'da düzenlenen ulusal ve uluslararası festivallere katılmıştır.<br><br>Alpha Classics için Howard Griffiths yönetiminde Mozarteum Orkestrası ile CD kaydı gerçekleştiren Sofiko, Julia Fischer ile birlikte Grünwald'de konserler vermiştir. ÇEV Sanat'ın düzenlediği İstanbul Zorlu PSM'deki konserde Maxim Vengerov ile aynı sahneyi paylaşmış; 2022 yılından itibaren ünlü şef Daniel Barenboim yönetimindeki Divan Orkestrası ile Köln, Lübliyana, Salzburg, Berlin ve Luzern'in de aralarında bulunduğu çeşitli şehirlerdeki konserlerde yer almıştır. Almanya'nın en prestijli oda müziği mekânlarından Schloss Elmau'nun Gürcü Festivali'nde dünyaca ünlü mandolin sanatçısı Avi Avital ve çok sevilen Gürcü topluluk Rustavi Ensemble ile birlikte sahne almıştır.<br><br>Erken yaşlardan itibaren birçok ödüle layık görülen kemancı, Gülden Turalı Ulusal Genç Müzisyenler Keman Yarışması'nda birincilik ödülüne layık görülmüş; Rudens Turku Vakfı'nın seyirci seçimiyle 'Yılın Öğrencisi' unvanını kazanmış ve özel ödülün de sahibi olmuştur. Almanya'da düzenlenen Ana Chumachenco Yarışması'nda birincilik ödülü, Türkiye'de düzenlenen 3. Ulusal Oda Müziği Yarışması'nda piyano üçlüsüyle birincilik ve genç sanatçılar için önemli organizasyonlardan biri olan İstanbul'daki İş Sanat Parlayan Yıldızlar konser serisinde 'Meriç Soylu' adına verilen birincilik ödülünün kazananı olmuştur.<br><br>ÇEV Sanat'ın (Çağdaş Eğitim Vakfı) bursiyeri olan Sofiko Tchumburidze, Deutsche Stiftung Musikleben tarafından düzenlenen Musikinstrumentenfonds 2024 yarışması neticesinde kendisine verilen 1890 yılı yapımı oldukça kıymetli Lorenzo Ventapane kemanı ile müzik kariyerine devam etmektedir.",
    bio_en: "Born in 2000 in Mersin, Turkey, into a Georgian musical family, Sofiko Tchumburidze began her violin studies at Mersin University State Conservatory with her mother Lily Tchumburidze. She began her undergraduate studies at the Hochschule für Musik und Theater München in 2018, first with Prof. Lena Neudauer and subsequently as a student of Prof. Julia Fischer, with whom she continues her master's studies. She is also pursuing an undergraduate degree in Baroque Violin with Prof. Mary Utiger.<br><br>She has participated in masterclasses given by Lukas David, Nora Chastain, Rudens Turku, Volker Jacobsen, Sergey Kravchenko, Dora Schwarzberg, Pierre Amoyal, Mayumi Hirasaki, Cihat Aşkın, Özcan Ulucan and Dimitri Sitkovetsky. Chamber music holds an important place in her artistic life; in addition to her solo performances, she has appeared as a chamber musician at the Istanbul Bosphorus Albert Long Hall Chamber Music Festival, the Chamber Music Days of the Hochschule für Musik und Theatre München and the prestigious Schloss Elmau Chamber Music Festival. Several of her chamber music performances have been recorded by the Bayerischer Rundfunk radio channel.<br><br>As a soloist she has performed with the Presidential Symphony Orchestra of the Republic of Turkey, Innsbruck University Orchestra, Çukurova State Symphony Orchestra, Bursa State Symphony Orchestra, Eskişehir Symphony Orchestra, Karşıyaka Chamber Orchestra and Antalya Symphony Orchestra, among others. She has participated in national and international festivals in Switzerland, Austria, Turkey and Germany, including the Youth Classics Festival, Semmering International Summer Festival, Istanbul Young Classics Festival, Seefeld Starnberger Music Days, Salzburg Festival, Tsinandali Festival and Insel Festival.<br><br>She has recorded a CD for Alpha Classics with the Mozarteum Orchestra under Howard Griffiths and given concerts in Grünwald alongside Julia Fischer. She shared the stage with Maxim Vengerov at a concert organised by ÇEV Sanat at Istanbul Zorlu PSM. Since 2022 she has appeared with the Divan Orchestra under the renowned conductor Daniel Barenboim in concerts across various cities including Cologne, Ljubljana, Salzburg, Berlin and Lucerne. At the Georgian Festival of Schloss Elmau, one of Germany's most prestigious chamber music venues, she performed alongside world-renowned mandolinist Avi Avital and the beloved Georgian ensemble Rustavi Ensemble.<br><br>Having received numerous prizes from an early age, she won first prize at the Gülden Turalı National Young Musicians Violin Competition and was chosen as 'Student of the Year' by audience vote at the Rudens Turku Foundation, also receiving a special award. She has won first prize at the Ana Chumachenco Competition in Germany, first prize in piano trio at the 3rd National Chamber Music Competition in Turkey, and first prize in the name of 'Meriç Soylu' at the İş Sanat Rising Stars concert series in Istanbul, one of the most important platforms for young artists.<br><br>A scholarship holder of ÇEV Sanat (Contemporary Education Foundation), Sofiko Tchumburidze continues her musical career playing the highly prized 1890 Lorenzo Ventapane violin awarded to her following the Musikinstrumentenfonds 2024 competition organised by Deutsche Stiftung Musikleben." },
  { ad: "Ilgın Top", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/ilgin_top.jpg",
    bio_tr: "Uluslararası alanda ödüller kazanmış kemancı Ilgın Top, hem solist hem de oda müzisyeni olarak dikkat çeken bir kariyere sahiptir. Güçlü tekniği, sahnedeki spontane yaklaşımı, doğal sahne karizması ve müziğe duyduğu içten bağlılık, yorumlarının en belirgin özellikleri arasında yer alır.<br><br>Lisans eğitimini Maastricht Konservatuvarı'nda Boris Belkin'in sınıfında üstün başarıyla tamamlayan sanatçı, bu süreçte solo keman ve oda müziği alanında geniş bir repertuvar oluşturmuştur. Bilkent Senfoni Orkestrası, İzmir ve İstanbul Devlet Senfoni Orkestraları, Bursa ve Eskişehir Senfoni Orkestraları, Başkent Oda Orkestrası, Ruse Filarmoni Orkestrası, Hacettepe Senfoni Orkestrası, Südwestdeutschen Oda Orkestrası Pforzheim ve Galiçya Kraliyet Filarmoni Orkestrası gibi önemli topluluklarla konserler vermiş; Rengim Gökmen başta olmak üzere birçok değerli şefle çalışmıştır.<br><br>Suna Kan Keman Yarışması, Arthur Grumiaux Keman Yarışması ve Pantcho Vladigerov Genç Müzisyenler Yarışması gibi saygın uluslararası yarışmalarda birincilik dahil olmak üzere çeşitli ana ve özel ödüllere layık görülmüştür. 2023 yılında Aydın Gün Teşvik Ödülü'nü kazanmıştır.<br><br>Varna Yaz Müzik Festivali, Bilkent 30. Yıl Festivali ve World Violins Festivali gibi önemli etkinliklerde sahne alan sanatçı; Zorlu PSM, Cemal Reşit Rey Konser Salonu ve Cumhurbaşkanlığı Senfoni Orkestrası Konser Salonu gibi prestijli salonlarda dinleyiciyle buluşmuştur. İlk profesyonel kaydını Prof. Cihat Aşkın yönetiminde gerçekleştirmiş, bu proje ING Bank tarafından desteklenmiştir.<br><br>İzmir doğumlu olan Ilgın Top, müzik eğitimine altı yaşında Bilkent Üniversitesi Müzik ve Sahne Sanatları Fakültesi'nde başlamıştır. Eğitim hayatı boyunca dünyanın önde gelen keman sanatçılarıyla çalışma fırsatı bulmuştur. Halen Hannover Müzik ve Tiyatro Yüksekokulu'nda Krzysztof Wegrzyn ile Konzertexamen (ileri düzey solistlik programı) programına devam etmektedir.<br><br>Ilgın Top, Deutsche Stiftung Musikleben tarafından kendisine tahsis edilen Stephan von Baehr yapımı özel bir kemanla çalışmalarını sürdürmektedir.",
    bio_en: "An internationally award-winning violinist, Ilgın Top has built a career distinguished both as a soloist and chamber musician. Her strong technique, spontaneous stage presence, natural charisma and sincere devotion to music are among the most defining qualities of her performances.<br><br>Having completed her undergraduate studies with distinction at the Maastricht Conservatory in the class of Boris Belkin, she developed an extensive repertoire in both solo violin and chamber music. She has performed with major ensembles including the Bilkent Symphony Orchestra, the Izmir and Istanbul State Symphony Orchestras, the Bursa and Eskişehir Symphony Orchestras, the Başkent Chamber Orchestra, the Ruse Philharmonic Orchestra, the Hacettepe Symphony Orchestra, the Südwestdeutsches Kammerorchester Pforzheim and the Royal Galician Philharmonic Orchestra, and has worked with many distinguished conductors, most notably Rengim Gökmen.<br><br>She has been awarded various first and special prizes at prestigious international competitions including the Suna Kan Violin Competition, the Arthur Grumiaux Violin Competition and the Pantcho Vladigerov Young Musicians Competition. In 2023 she received the Aydın Gün Encouragement Award.<br><br>She has performed at major events such as the Varna Summer Music Festival, the Bilkent 30th Anniversary Festival and the World Violins Festival, and has appeared in prestigious venues including Zorlu PSM, Cemal Reşit Rey Concert Hall and the Presidential Symphony Orchestra Concert Hall. She made her first professional recording under the direction of Prof. Cihat Aşkın, a project supported by ING Bank.<br><br>Born in Izmir, Ilgın Top began her musical education at the age of six at Bilkent University Faculty of Music and Performing Arts. Throughout her studies she has had the opportunity to work with leading violinists from around the world. She is currently pursuing the Konzertexamen (advanced soloist programme) at the Hochschule für Musik, Theater und Medien Hannover with Krzysztof Wegrzyn.<br><br>Ilgın Top continues her work on a special violin by Stephan von Baehr, made available to her by Deutsche Stiftung Musikleben." },
  { ad: "Doğa Altınok", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/doga_altinok.jpg",
    bio_tr: "2000 doğumlu Doğa Altınok, keman eğitimine 2007'de Çukurova Üniversitesi Devlet Konservatuvarı'nda Prof. Hakan Çuhadar ile başlamış; 2009'da Daniya Kaynova ile devam etmiştir.<br><br>2010 yılında düzenlenen 4. Gülden Turalı Ulusal Keman Yarışması küçükler kategorisinde ikincilik ödülüne ve Server Acim'e ait 'Filiz' adlı eseri en iyi yorumlayan yarışmacı ödülüne layık görüldü. 2011 yılında Berlin'de düzenlenen Uluslararası 'Sforzando' Müzik Yarışması'nda kendi kategorisinde birinci, 2012 yılında Slovakya'da düzenlenen 'Talents For Europe' yarışmasında ikinci oldu. 2012 yılında Paris'te düzenlenen 'We Play Together' Uluslararası Müzik Yarışması'nda hem solo hem de oda müziği kategorilerinde birincilik ödülleri kazandı. 2012 Donizetti Klasik Müzik Ödülleri kapsamında 17 yaş altı 'Yılın Çıkış Yapan Genç Müzisyeni' seçildi. 2013 yılında Vladimir Spivakov tarafından düzenlenen 'Moscow Meets Friends' festivali kapsamında konser vermeye davet edildi.<br><br>2014 yılında Viyana'da Universität für Musik und darstellende Kunst Wien (MDW) tarafından düzenlenen sınava katılarak 'Highly Gifted Students' sınıfına seçildi. 2015 yılı Mart ayında Sofya'da gerçekleşen 11. Uluslararası 'Young Virtuosos' Yarışması'nda bir üst kategori olan 16–19 yaş kategorisinde birincilik elde etti. 2015 yılı Mayıs ayında İtalya/Fermo'da düzenlenen 22. Uluslararası 'Andrea Postacchini' Yarışması'nda kendi kategorisinde birincilik ödülünü kazandı. 2017 yılı Nisan ayında Sedat-Güzin Gürel Sanat ve Bilim Vakfı ile IDSO'nun gerçekleştirdiği Ulusal Genç Yetenekler Yarışması'nda birincilik elde etti ve solist olarak 19 Mayıs konserinde W. A. Mozart 4. Keman Konçertosu'nu icra etti. 2018 yılı Haziran ayında Ukrayna/Odessa'da gerçekleşen 'Odessa International Music Competition'da üçüncülük, 2019 yılı Temmuz ayında Macaristan/Budapeşte'de gerçekleşen 3. Uluslararası 'Ilona Fehér' Keman Yarışması'nda ikincilik ödülüne layık görüldü. 2020 yılı Mart ayında Belçika/Brüksel'de gerçekleşen 13. Uluslararası 'Arthur Grumiaux Competition for Young Violinists' yarışmasında birincilik ödülünü kazandı.<br><br>Bugüne kadar İzmir Devlet Senfoni, Antalya Devlet Senfoni, Bursa Devlet Senfoni, Cumhurbaşkanlığı Senfoni, İstanbul Devlet Senfoni, Orquestra de Camara de Cascais e Oeiras (Lizbon) ve Odessa Filarmoni Orkestraları eşliğinde konserler veren Doğa Altınok; Moskova, Iguazu, Tokyo, Tallinn, Toulouse, Lviv, Dubrovnik, Saraybosna, Varna, Münih, Viyana, Milano ve Prag'da resitaller ve oda müziği konserleri vermiştir.<br><br>Doğa Altınok, Güher & Süher Pekinel 'Dünya Sahnelerinde Genç Müzisyenler' Projesi dahilinde TÜPRAŞ tarafından 2013–2017 yılları arasında desteklenmiş; bu süreçte eğitimine 2013–2018 yılları arasında Viyana'daki Amadeus International School'da tam burslu olarak Prof. Dora Schwarzberg ile devam etmiştir. 2018 Haziran ayında Çağdaş Eğitim Vakfı burs sınavında başarılı olarak QNB Finansbank tarafından desteklenen ÇEV Vakfı'nın 'Genç Yetenekler' projesinin üyelerinden biri oldu.<br><br>Eylül 2018 – Haziran 2021 tarihleri arasında Viyana Müzik ve Sahne Sanatları Üniversitesi'nde (MDW) Prof. Lotar Strauss'un sınıfında eğitim gören Doğa Altınok, aynı zamanda eğitimine Prof. Dora Schwarzberg ile devam etmiş; Eylül 2021'den itibaren Prof. Anton Sorokow'un sınıfına geçmiştir. 2021 yılında MDW'de düzenlenen solist seçme sınavında birinci seçilmesi neticesinde 1778 yılında Michelle Deconnet tarafından yapılmış kemanın kullanım hakkını kazandı. Ocak 2023'te Viyana Müzik ve Sahne Sanatları Üniversitesi'nde lisans eğitimini tamamlayan Doğa, aynı ay Viyana'daki Tonkünstler Orkestrası'nın Akademi seçmelerini kazandı. Aralık 2023'te Tonkünstler Orkestrası'nda ikinci kemanların yardımcı grup şefi pozisyonu için yapılan seçmeleri de kazanan sanatçı, Mart 2023'ten bu yana Prof. Anton Sorokow'un sınıfında yüksek lisans eğitimine devam etmektedir.",
    bio_en: "Born in 2000, Doğa Altınok began her violin studies in 2007 at Çukurova University State Conservatory with Prof. Hakan Çuhadar, continuing from 2009 with Daniya Kaynova.<br><br>In 2010 she was awarded second prize in the junior category of the 4th Gülden Turalı National Violin Competition, as well as the prize for best interpretation of Server Acim's work 'Filiz.' In 2011 she won first place in her category at the International 'Sforzando' Music Competition in Berlin, and in 2012 took second place at the 'Talents For Europe' competition in Slovakia. That same year she won first prizes in both solo and chamber music categories at the 'We Play Together' International Music Competition in Paris. She was named 'Breakthrough Young Musician of the Year' under 17 at the 2012 Donizetti Classical Music Awards, and in 2013 was invited to perform at the 'Moscow Meets Friends' festival organised by Vladimir Spivakov.<br><br>In 2014 she was accepted into the 'Highly Gifted Students' class following an audition at the Universität für Musik und darstellende Kunst Wien (MDW) in Vienna. In March 2015 she won first place in the 16–19 age category — one above her own — at the 11th International 'Young Virtuosos' Competition in Sofia. In May 2015 she won first prize in her category at the 22nd International 'Andrea Postacchini' Competition in Fermo, Italy. In April 2017 she won first place at the National Young Talents Competition organised by the Sedat-Güzin Gürel Foundation for Art and Science and IDSO, subsequently performing W. A. Mozart's Violin Concerto No. 4 as soloist at the 19 May concert. In June 2018 she received third prize at the 'Odessa International Music Competition' in Ukraine, and in July 2019 second prize at the 3rd International 'Ilona Fehér' Violin Competition in Budapest. In March 2020 she won first prize at the 13th International 'Arthur Grumiaux Competition for Young Violinists' in Brussels.<br><br>She has performed with the Izmir State Symphony, Antalya State Symphony, Bursa State Symphony, Presidential Symphony, Istanbul State Symphony, Orquestra de Camara de Cascais e Oeiras (Lisbon) and Odessa Philharmonic Orchestras, and has given recitals and chamber music concerts in Moscow, Iguazu, Tokyo, Tallinn, Toulouse, Lviv, Dubrovnik, Sarajevo, Varna, Munich, Vienna, Milan and Prague.<br><br>Doğa Altınok was supported by TÜPRAŞ between 2013 and 2017 as part of the Güher & Süher Pekinel 'Young Musicians on World Stages' Project, during which time she studied on a full scholarship with Prof. Dora Schwarzberg at the Amadeus International School in Vienna from 2013 to 2018. In June 2018 she was accepted into the ÇEV Foundation's 'Young Talents' project, supported by QNB Finansbank, following a successful scholarship examination.<br><br>Between September 2018 and June 2021 she studied at the University of Music and Performing Arts Vienna (MDW) in the class of Prof. Lotar Strauss, while continuing to work with Prof. Dora Schwarzberg. From September 2021 she moved to the class of Prof. Anton Sorokow. In 2021, having been placed first in the soloist audition held at MDW, she was awarded the right to play a violin made in 1778 by Michelle Deconnet. In January 2023 she completed her undergraduate degree at MDW and won the audition for the Tonkünstler Orchestra Academy in Vienna. In December 2023 she won the audition for the position of associate concertmaster of the second violins in the Tonkünstler Orchestra. Since March 2023 she has been continuing her master's studies in the class of Prof. Anton Sorokow." },
 { ad: "Yağmur Tuna", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/yagmur_tuna.jpg",
    bio_tr: "Yağmur Tuna, 2005 yılında Eskişehir'de doğdu. Keman eğitimine sekiz yaşında Arzu Özkaynak ile başladı. 2014 yılında MEB Bilim Sanat Merkezi tarafından açılan 'Üstün Yetenekli Çocuklar' müzik sınavını kazandı. 2015 yılında Anadolu Üniversitesi Devlet Konservatuvarı sınavlarını kazanarak Prof. Gülen Ege Serter'in keman sınıfında konservatuvar eğitimine başladı.<br><br>New Virtuosi Ustalık Sınıfları, Bilkent Üniversitesi Keman Günleri, CAKA ustalık sınıfları, Gümüşlük Festivali, Uluslararası Burgos Müzik Festivali (İspanya) ve Muhammedjan Turdiyev Kültür Evi ustalık sınıflarına katılarak Boris Kuschnir, Alexander Markov, Ayla Erduran, Lutsia Ibragimova, Cihat Aşkın, Saveliy Shalman, Ani Schnarch, Itzhak Rashkovsky ve Felix Andrievsky gibi müzisyenlerle çalıştı.<br><br>2017 yılında St. Petersburg'da düzenlenen 8. Uluslararası Akademia Festivali Enstrüman ve Vokal Sanatları Yarışması'nda birincilik ödülünü kazandı. Temmuz 2017'de 41. Uluslararası Burgos Müzik Festivali kapsamında düzenlenen ve değerlendirmede yaş sınırı olmayan yarışmada üçüncülük ödülünü kazandı. 19 Nisan 2019'da Gürer Aykal'ın yönetiminde Eskişehir Büyükşehir Belediyesi Senfoni Orkestrası eşliğinde Gökhan Aybulus ile solist olarak konser verdi. 2020 yılında Moskova Tchaikovsky Konservatuvarı Merkez Müzik Okulu'nu kazandı. Aralık 2021'de şef Daniel Fedorean yönetiminde Mersin Üniversitesi Devlet Konservatuvarı Orkestrası eşliğinde solist olarak konser verdi.<br><br>Mart 2022'de Brüksel'de düzenlenen Uluslararası YSAYE Yarışması'nda üçüncülük ödülü kazandı. Ayrıca Moskova'da düzenlenen Uluslararası 'Krasky Muzyky' Yarışması'nda 16–19 yaş grubunda, kategorisindeki en küçük yarışmacı olarak birincilik ödülü kazandı. Nisan ayında Türkiye Gençlik Filarmoni Orkestrası'nın (TUGFO) seçmelerini birinci keman olarak kazandı. Eylül 2022'de yıl boyunca göstermiş olduğu başarı nedeniyle Tchaikovsky Konservatuvarı rektörü ve piyanist Prof. Valery Pyasetsky tarafından onur belgesi aldı.<br><br>1 Şubat 2023'te Uluslararası Paris Nouvelles Etoiles Yarışması'nda kendi kategorisindeki en küçük yarışmacı olarak birincilik ödülü aldı. 5 Mart 2023'te Moskova Bolşoy Tiyatrosu'nda konser verdi. 30 Haziran 2023'te Moskova Merkez Müzik Okulu'nu kırmızı diploma (üstün başarı–onur belgesi) ile bitirdi. Ağustos 2023'te Moskova Çaykovski Konservatuvarı'nı yabancı öğrenciler arasında en yüksek puanla kazanarak ücretsiz okuma hakkı kazandı ve Prof. Alexander Vinnitski'nin öğrencisi oldu. Yine ağustos ayında Enka Vakfı'nın düzenlediği Lale Tara Sanat Bursu'nu kazandı.<br><br>23 Aralık 2023'te Paris'te düzenlenen 'Nouvelles Etoiles' yarışmasının gala konserinde orkestra ile solist olarak sahne aldı ve özel ödüle layık görüldü. Şubat 2024'te Turku University of Applied Sciences'ın daveti üzerine 8 Mayıs 2024 tarihinde Kristian Sallinen yönetiminde Turku Filarmoni Orkestrası ile solist olarak Turku Sigyn Hall'da konser verdi. Temmuz 2024'te Türkiye Gençlik Filarmoni Orkestrası üyesi olarak konserlerde yer aldı; 30 Temmuz 2024'te Venedik Scuola Grande di San Rocco'da şef Cem Mansur yönetiminde Türkiye Gençlik Filarmoni Orkestrası'nın solisti olarak konser vererek Türkiye'yi temsil etti. Ağustos 2024'te St. Petersburg'da düzenlenen Uluslararası Stravinsky Yarışması'nda birincilik ödülü aldı. Mart 2025'te Cumhurbaşkanlığı Senfoni Orkestrası ve Moskova Büyükelçiliği tarafından düzenlenen 'Türk ve Rus Müzisyenler Moskova'da Buluşuyor' konserinde Türkiye'yi temsil etti.<br><br>Nisan 2025'te Eskişehir Büyükşehir Belediyesi Senfoni Orkestrası'nın solisti olarak şef Kerem Tunçer yönetiminde, Mayıs 2025'te İstanbul Devlet Senfoni Orkestrası'nın solisti olarak şef Murat Cem Orhan yönetiminde, Kasım 2025'te Rusya'nın Voronezh kentinde Voronezh Senfoni Orkestrası'nın solisti olarak Yuriy Androsov yönetiminde, Aralık 2025'te ise Enka Oditoryumu'nda Prof. Gökhan Aybulus ile 'Enka Sanat Lale Tara Bursu İlk Kuşak Konseri'nde sahne aldı.<br><br>Yağmur Tuna, Moskova Çaykovski Konservatuvarı'nda ve Turku Uygulamalı Bilimler Üniversitesi'nde Prof. Alexander Vinnitski'nin sınıfında konservatuvar eğitimini başarıyla sürdürmektedir.",
    bio_en: "Yağmur Tuna was born in 2005 in Eskişehir. She began her violin studies at the age of eight with Arzu Özkaynak. In 2014 she won the 'Gifted Children' music examination organised by the Ministry of National Education's Science and Arts Centre. In 2015 she passed the entrance examinations of Anadolu University State Conservatory and began her conservatory education in the violin class of Prof. Gülen Ege Serter.<br><br>She has participated in the New Virtuosi Masterclasses, Bilkent University Violin Days, CAKA masterclasses, Gümüşlük Festival, International Burgos Music Festival (Spain) and Muhammedjan Turdiyev Cultural Centre masterclasses, working with musicians including Boris Kuschnir, Alexander Markov, Ayla Erduran, Lutsia Ibragimova, Cihat Aşkın, Saveliy Shalman, Ani Schnarch, Itzhak Rashkovsky and Felix Andrievsky.<br><br>In 2017 she won first prize at the 8th International Akademia Festival Competition for Instrumental and Vocal Arts in St. Petersburg. In July 2017 she won third prize at the competition held as part of the 41st International Burgos Music Festival, which carried no age restriction in its judging. On 19 April 2019 she performed as soloist alongside Gökhan Aybulus with the Eskişehir Metropolitan Municipality Symphony Orchestra under Gürer Aykal. In 2020 she was admitted to the Central Music School of the Moscow Tchaikovsky Conservatory. In December 2021 she performed as soloist with the Mersin University State Conservatory Orchestra under conductor Daniel Fedorean.<br><br>In March 2022 she won third prize at the International YSAYE Competition in Brussels. She also won first prize at the International 'Krasky Muzyky' Competition in Moscow in the 16–19 age group, as the youngest competitor in her category. In April of the same year she won the audition for the Turkey Youth Philharmonic Orchestra (TUGFO) as first violin. In September 2022 she received a certificate of honour from the rector of the Tchaikovsky Conservatory, pianist Prof. Valery Pyasetsky, in recognition of her achievements throughout the year.<br><br>On 1 February 2023 she won first prize at the International Paris Nouvelles Etoiles Competition as the youngest competitor in her category. On 5 March 2023 she performed at the Moscow Bolshoi Theatre. On 30 June 2023 she graduated from the Moscow Central Music School with a red diploma (summa cum laude). In August 2023 she was admitted to the Moscow Tchaikovsky Conservatory with the highest score among international students, earning the right to study free of charge, and became a student of Prof. Alexander Vinnitski. That same month she won the Lale Tara Arts Scholarship of the Enka Foundation.<br><br>On 23 December 2023 she performed as soloist with orchestra at the gala concert of the 'Nouvelles Etoiles' competition in Paris and received a special prize. In February 2024, at the invitation of Turku University of Applied Sciences, she performed as soloist with the Turku Philharmonic Orchestra under Kristian Sallinen at Turku Sigyn Hall on 8 May 2024. In July 2024 she appeared in concerts as a member of the Turkey Youth Philharmonic Orchestra; on 30 July 2024 she represented Turkey as the soloist of the Turkey Youth Philharmonic Orchestra at the Scuola Grande di San Rocco in Venice under conductor Cem Mansur. In August 2024 she won first prize at the International Stravinsky Competition in St. Petersburg. In March 2025 she represented Turkey at the 'Turkish and Russian Musicians Meet in Moscow' concert organised by the Presidential Symphony Orchestra and the Moscow Embassy.<br><br>In April 2025 she performed as soloist with the Eskişehir Metropolitan Municipality Symphony Orchestra under conductor Kerem Tunçer; in May 2025 with the Istanbul State Symphony Orchestra under conductor Murat Cem Orhan; in November 2025 with the Voronezh Symphony Orchestra under Yuriy Androsov in Voronezh, Russia; and in December 2025 she appeared at Enka Auditorium with Prof. Gökhan Aybulus at the 'Enka Sanat Lale Tara Scholarship First Generation Concert.'<br><br>Yağmur Tuna continues her conservatory education successfully in the class of Prof. Alexander Vinnitski at the Moscow Tchaikovsky Conservatory and Turku University of Applied Sciences." },
 { ad: "İdil Olgar", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/idil_olgar.jpg",
    bio_tr: "2006 yılında Mersin'de doğan İdil Olgar, keman eğitimine 2012 yılında Mersin Üniversitesi Devlet Konservatuvarı'nda Öğretim Görevlisi Isabelle M. Kollo (Özdemir) ile yarı zamanlı olarak başladı. Çalışmalarına Dania Kainova ve Onur Yıldız ile devam etti. Igor Tkatchouk, Şenis Aybulus, Rasim Bağırov, Feruza Abdullaeva, Cihat Aşkın, Lutsia Ibragimova, Bahar Kutay, Mikhail Gotsdiner, Gilles Apap, Artur Kaganovskiy, Tuncay Yılmaz, Anı Schnarch, Itzhak Rashkovsky, Erzhan Kulibayev, Hakan Şensoy, Muhammedjan Turdiyev, Gülen Ege Serter, Fedor Rudin, Çiğdem İyicil, Igor Pikayzen, Mehmet Yasemin, Yamei Yu, Anton Sorokow ve Tanja Becker-Bender'ın masterclass programlarına katıldı.<br><br>İlk solo konserini 2016 yılında Kuşadası Belediye Orkestrası ile verdi. İstanbul Devlet Senfoni Orkestrası'nın düzenlediği 2016 Ulusal Genç Yetenekler Yarışması'nda İDSO ile solist olarak çalmaya hak kazandı. 2016–2017 Eğitim-Öğretim Döneminde Mersin Üniversitesi Devlet Konservatuvarı Keman Dalı'nda tam zamanlı eğitim gördü. 2017 yılında Slovakya'nın Dolny Kubin şehrinde düzenlenen 'Avrupa İçin Yetenek Keman Yarışması'nda üçüncülük ödülünü kazandı. 30 Nisan 2018 tarihinde 'İş Sanatın Parlayan Yıldızları' seçmelerinde Milli Reasürans konser salonunda resital verme hakkı kazandı ve bu konserde üçüncülük ödülünü aldı. 2018 yılında Prag'da düzenlenen 'PhDr Josef Micka Uluslararası Keman Yarışması'nda ikincilik ödülü ve 'Doktor Josef Micka' özel ödülünü kazandı. Aynı yıl Budapeşte'de düzenlenen 2. Uluslararası Ilona Fehér Yarışması'nda birincilik ödülünü aldı. 2019 yılında 18. Uluslararası Mersin Müzik Festivali'nde Nevit Kodallı Genç Yetenekler ödülüne layık görüldü.<br><br>2020 yılında Doğuş Çocuk Senfoni Orkestrası'na seçildi. 2021 yılında Polonya'da düzenlenen 1. Uluslararası Çevrimiçi Enstrümantal Performans Yarışması'nda ikincilik ödülünü kazandı. Aynı yıl katıldığı çevrimiçi yarışmalarda çeşitli dereceler elde etti: Alkanova Müzik Yarışması'nda birincilik, World Open Online Competition'da en yüksek puanla birincilik, Music Stars Awards'ta birincilik ve Uluslararası Medici Müzik Yarışması'nda üçüncülük ödüllerini kazandı. 2022 yılında Türkiye Ulusal Gençlik Filarmoni Orkestrası'nı kazandı, Amadeus Uluslararası Müzik Yarışması'nda özel ödül ve Fransa Müzik Yarışması'nda ikincilik ödülünü elde etti. 2023 yılında Türkiye'de çok sayıda resital verdi; oda müziği grubuyla AKOB Oda Müziği Yarışması'nı kazandı. 2024 yılında İzmir Senfoni Orkestrası ile solist olarak Sibelius Keman Konçertosu'nu seslendirdi.<br><br>2025 yılında oda müziği grubuyla Lamont School of Music Oda Müziği Yarışması'nı kazanarak Colorado Müzik Festivali'ne davet edildi ve CPR radyo istasyonuyla Mendelssohn Piyano Üçlüsü No. 1'in kaydını gerçekleştirme şansını elde etti. 29 Mayıs 2025'te Augustin Hadelich için Brahms Keman Konçertosu'nu çalma fırsatı buldu ve 'çok yetenekli kemancı' olarak övgüyle karşılandı. Çalışmalarına Igor Pikayzen ile devam etmektedir. 2026 yılından itibaren Jean Baptiste Vuillaume yapımı keman ile çalmaktadır.",
    bio_en: "Born in 2006 in Mersin, İdil Olgar began violin studies in 2012 at Mersin University State Conservatory with Instructor Isabelle M. Kollo (Özdemir), initially on a part-time basis. She continued her studies with Dania Kainova and Onur Yıldız. She has participated in masterclass programmes given by Igor Tkatchouk, Şenis Aybulus, Rasim Bağırov, Feruza Abdullaeva, Cihat Aşkın, Lutsia Ibragimova, Bahar Kutay, Mikhail Gotsdiner, Gilles Apap, Artur Kaganovskiy, Tuncay Yılmaz, Anı Schnarch, Itzhak Rashkovsky, Erzhan Kulibayev, Hakan Şensoy, Muhammedjan Turdiyev, Gülen Ege Serter, Fedor Rudin, Çiğdem İyicil, Igor Pikayzen, Mehmet Yasemin, Yamei Yu, Anton Sorokow and Tanja Becker-Bender.<br><br>She gave her first solo concert in 2016 with the Kuşadası Municipal Orchestra. She won the right to perform as soloist with the Istanbul State Symphony Orchestra (ISSO) at the 2016 National Young Talents Competition organised by ISSO. During the 2016–2017 academic year she studied full-time in the violin department of Mersin University State Conservatory. In 2017 she won third prize at the 'Talent for Europe Violin Competition' held in Dolny Kubin, Slovakia. On 30 April 2018 she won the right to give a recital at the Milli Reasürans Concert Hall in the İş Sanat Rising Stars auditions, where she received third prize. In 2018 she won second prize and the special 'Dr Josef Micka' prize at the 'PhDr Josef Micka International Violin Competition' in Prague. That same year she won first prize at the 2nd International Ilona Fehér Competition in Budapest. In 2019 she was awarded the Nevit Kodallı Young Talents prize at the 18th International Mersin Music Festival.<br><br>In 2020 she was selected for the Doğuş Children's Symphony Orchestra. In 2021 she won second prize at the 1st International Online Instrumental Performance Competition in Poland. In the same year she achieved distinctions in several online competitions: first prize at the Alkanova Music Competition, first prize with the highest score at the World Open Online Competition, first prize at the Music Stars Awards, and third prize at the International Medici Music Competition. In 2022 she was admitted to the Turkey National Youth Philharmonic Orchestra, received a special prize at the Amadeus International Music Competition and won second prize at the France Music Competition. In 2023 she gave numerous recitals across Turkey and won the AKOB Chamber Music Competition with her chamber music ensemble. In 2024 she performed the Sibelius Violin Concerto as soloist with the Izmir Symphony Orchestra.<br><br>In 2025 her chamber music ensemble won the Lamont School of Music Chamber Music Competition, leading to an invitation to the Colorado Music Festival and the opportunity to record Mendelssohn's Piano Trio No. 1 with CPR radio station. On 29 May 2025 she had the opportunity to perform the Brahms Violin Concerto for Augustin Hadelich and was praised as a 'highly talented violinist.' She continues her studies with Igor Pikayzen. Since 2026 she plays on a violin by Jean Baptiste Vuillaume." },
  { ad: "İlke Işı Tuncer", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/ilke_isi_tuncer.jpg",
    bio_tr: "2005 yılında Ankara'da doğan İlke Işı Tuncer, 5 yaşında piyano çalmaya başladı. 2011 yılında Bilkent Üniversitesi Müzik ve Sahne Sanatları Fakültesi İlköğretim Bale ve Müzik Okulu'nun keman bölümüne kabul edilerek 7 yaşında Nil Çetiz ile çalışmaya başladı. Ortaokul eğitimine Hacettepe Üniversitesi Ankara Devlet Konservatuvarı'nda devam etti. 2022 yılından bu yana Belçika'daki Musica Mundi School'da eğitimini sürdürmektedir.<br><br>'Müziğe içten ve adanmış bir yaklaşımı var. Öğrenme arzusu ve becerilerini sürekli olarak geliştirme isteği, performansını ve sanatsal gelişimini daima ileriye taşıyor. Yeni müzikal ve sanatsal deneyimleri keşfetmeyi seviyor ve çalışmalarına merak ve kararlılıkla yaklaşıyor. Azmi ve detaylara gösterdiği özen, performanslarını etkileyici, kusursuz ve kendine özgü kılıyor. Işı'nın çalış tarzı, teknik beceri ile müzikal ifadenin dengesini yansıtıyor.' — Leonid Kerbel<br><br>Berlin Konzerthaus, Prag Rudolfinum Smetana Hall, Bozar Brussels, Roma Santa Cecilia ve Türkiye Cumhurbaşkanlığı Senfoni Orkestrası Konser Salonu gibi prestijli mekânlarda sahne almıştır. İngiltere, ABD, Belçika, Almanya, Macaristan, İtalya, Çek Cumhuriyeti ve Türkiye'de düzenlenen özel etkinlik ve konserlerde yer almıştır. İstanbul Müzik Festivali, Musica Mundi Festivali, Festival Academy Budapest ve Young Euro Classics gibi festivallere katılmıştır. Dünya çapında tanınmış kemancı ve eğitmenlerle çalışma fırsatı bulan sanatçının bu isimler arasında Midori, Boris Kuschnir, Mihaela Martin ve Dylan Blackmore yer almaktadır. Oda müziği alanında Jacques Rouvier, Vladimir Perlin ve Zvi Carmeli ile çalışmıştır.<br><br>Kariyeri boyunca Türkiye ve Belçika'da çeşitli orkestralar eşliğinde solist olarak sahne almıştır. Bu orkestralar arasında İstanbul Devlet Senfoni Orkestrası, Türkiye Cumhurbaşkanlığı Senfoni Orkestrası, Sonores Orchestra Gent (Belçika), AIMA Festival Orkestrası, Eskişehir Büyükşehir Belediyesi Senfoni Orkestrası, Hacettepe Senfoni Orkestrası, Çeşme Festival Orkestrası ve PhilSurround Orkestrası Tilburg (Hollanda) yer almaktadır.<br><br>Türkiye Gençlik Filarmoni Orkestrası'nda başkemancı olarak seçilen Işı Tuncer, şef Cem Mansur ile çalışmış ve orkestra ile birlikte ünlü piyanist Anna Fedorova eşliğinde sahne almıştır.<br><br>Üstün yeteneği ve potansiyeli nedeniyle 48. İstanbul Müzik Festivali ve TSKB iş birliğiyle verilen 'Yarının Kadın Yıldızları: Genç Kadın Müzisyenler Destek Fonu' bursunu kazandı. Bu burs kapsamında İstanbul Müzik Festivali çerçevesinde Süreyya Operası'nda sahne aldı. 2025 yılında Royal College of Music London'da tam burslu eğitim hakkı kazandı. Ayrıca TRT Radyo-3'te konuk sanatçı olarak yer aldı ve bir resital programı kaydetti.<br><br>Yarışma ödülleri arasında Sırbistan Uluslararası Müzik Yarışması'nda birincilik, Ulusal Genç Yetenekler Yarışması'nda Grand Prix ve birincilik, İstanbul Devlet Senfoni Orkestrası'nın düzenlediği Ulusal Genç Müzisyenler Yarışması'nda üçüncülük ve 2025 yılında 3. Arnold Rose Uluslararası Keman Yarışması'nda özel 'Wiener Klassik' ödülü yer almaktadır.<br><br>2022–2025 yılları arasında özel bir bağışçı tarafından ödünç verilen 1741 yapımı Giovanni Floreno Guidante kemanı ile çalmaktadır.",
    bio_en: "Born in 2005 in Ankara, İlke Işı Tuncer began playing the piano at the age of five. In 2011 she was accepted into the violin department of Bilkent University Faculty of Music and Performing Arts Elementary Ballet and Music School and began studying with Nil Çetiz at the age of seven. She continued her secondary education at Hacettepe University Ankara State Conservatory. Since 2022 she has been studying at Musica Mundi School in Belgium.<br><br>'She has a sincere and dedicated approach to music. Her desire to learn and her constant drive to improve her skills always propel her performance and artistic development forward. She loves discovering new musical and artistic experiences and approaches her work with curiosity and determination. Her perseverance and attention to detail make her performances impressive, flawless and distinctive. Işı's way of playing reflects a balance between technical skill and musical expression.' — Leonid Kerbel<br><br>She has performed at prestigious venues including Berlin Konzerthaus, Prague Rudolfinum Smetana Hall, Bozar Brussels, Rome's Santa Cecilia and the Presidential Symphony Orchestra Concert Hall. She has appeared at special events and concerts in England, the USA, Belgium, Germany, Hungary, Italy, the Czech Republic and Turkey. She has participated in festivals including the Istanbul Music Festival, Musica Mundi Festival, Festival Academy Budapest and Young Euro Classics. She has had the opportunity to work with world-renowned violinists and educators including Midori, Boris Kuschnir, Mihaela Martin and Dylan Blackmore, and in the field of chamber music with Jacques Rouvier, Vladimir Perlin and Zvi Carmeli.<br><br>Throughout her career she has performed as a soloist with various orchestras in Turkey and Belgium, including the Istanbul State Symphony Orchestra, the Presidential Symphony Orchestra of Turkey, Sonores Orchestra Gent (Belgium), AIMA Festival Orchestra, Eskişehir Metropolitan Municipality Symphony Orchestra, Hacettepe Symphony Orchestra, Çeşme Festival Orchestra and PhilSurround Orchestra Tilburg (Netherlands).<br><br>Selected as concertmaster of the Turkey Youth Philharmonic Orchestra, she has worked with conductor Cem Mansur and performed alongside the renowned pianist Anna Fedorova with the orchestra.<br><br>In recognition of her exceptional talent and potential, she was awarded the 'Tomorrow's Women Stars: Young Women Musicians Support Fund' scholarship, established through a collaboration between the 48th Istanbul Music Festival and TSKB. Under this scholarship she performed at Süreyya Opera House as part of the Istanbul Music Festival. In 2025 she was awarded a full scholarship to the Royal College of Music London. She has also appeared as a guest artist on TRT Radio-3, where she recorded a recital programme.<br><br>Her competition prizes include first place at the Serbia International Music Competition, the Grand Prix and first place at the National Young Talents Competition, third place at the National Young Musicians Competition organised by the Istanbul State Symphony Orchestra, and the special 'Wiener Klassik' award at the 3rd Arnold Rose International Violin Competition in 2025.<br><br>Between 2022 and 2025 she plays on a 1741 Giovanni Floreno Guidante violin kindly loaned by a private benefactor." },
  { ad: "Ada Enön", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/ada_enon.jpg",
    bio_tr: "31 Ekim 2001 tarihinde İstanbul'da doğan Ada Enön, keman çalışmalarına 2007 yılında Lili Tchumburidze'nin öğrencisi olarak başladı. 2008 yılında Mersin Üniversitesi Devlet Konservatuvarı yarı zamanlı keman programına kabul edilerek eğitimine Lili Tchumburidze ile devam etti. Henüz 10 yaşındayken Mersin Devlet Opera ve Balesi Orkestrası eşliğinde solist olarak konser verdi. Aynı yıllarda Mersin Üniversitesi Devlet Konservatuvarı Akademik Oda Orkestrası'nda orkestra üyesi olarak yer aldı.<br><br>2013 yılında 3. Uluslararası Harmony Keman Yarışması'nda birincilik ödülü, 2014 yılında ise Belçika'da düzenlenen Grumiaux (Bravo) Uluslararası Keman Yarışması'nda mansiyon ödülü aldı. Yurtiçi ve yurtdışında Salzburg Müzik Festivali ve Bergerac Müzik Festivali dahil olmak üzere birçok festival ve ustalık sınıfına katıldı; bu kapsamda Prof. Dora Schwarzberg, Prof. Ana Chumachenko, Prof. Nataly Boyarsky, Prof. Tedi Papavrami, Prof. Lucas David, Prof. Sergey Kravchenko, Prof. Louise Chisson, Prof. Rudens Turku ve Prof. Fedor Rudin ile çalışma fırsatı buldu.<br><br>2015 yılında Mersin Üniversitesi Devlet Konservatuvarı'ndan mezun olduktan sonra lise eğitimi için İstanbul'a taşınarak Notre Dame de Sion Fransız Lisesi'nde öğrenim gördü. Bu süreçte müzik eğitimine Mimar Sinan Güzel Sanatlar Üniversitesi Devlet Konservatuvarı İleri Düzey Programı'nda Aslı Çivicioğlu ile devam etti ve 2018 yılında mezun oldu. Lise yıllarında aynı zamanda Louise Chisson ve Lili Tchumburidze ile çalışmalarını sürdürdü ve Şef Orçun Orçunsel yönetimindeki Orchestra'Sion ile orkestra üyesi olarak birçok konserde yer aldı.<br><br>2020 yılında Sorbonne Üniversitesi Müzikoloji Bölümü'ne ve Paris Bölge Konservatuvarı'na (CRR de Paris) kabul edildi. Paris'teki öğrenimi boyunca Sorbonne Üniversitesi Orkestrası ve Paris Bölge Konservatuvarı Senfoni Orkestrası'nın aktif üyesi olarak düzenli konserler verdi. Aynı dönemde Orchestre de Paris bünyesinde Philharmonie de Paris'de staj programına katıldı ve 2023 yılında Orchestra'Sion eşliğinde solist olarak konser verdi.<br><br>2024 yılında Sorbonne Üniversitesi ve Paris Bölge Konservatuvarı'ndan mezun olduktan sonra 2024–2025 yılları arasında Viyana'daki Schubert Konservatuvarı'nda Prof. Louise Chisson ile çalışmalarını sürdürdü. Günümüzde çalışmalarına devam etmekte olup İzmir Oda Orkestrası üyesidir.",
    bio_en: "Born on 31 October 2001 in Istanbul, Ada Enön began violin studies in 2007 as a student of Lily Tchumburidze. In 2008 she was admitted to the part-time violin programme of Mersin University State Conservatory and continued her studies there with Lily Tchumburidze. At just ten years of age she gave a solo concert with the Mersin State Opera and Ballet Orchestra. During the same period she was a member of the Mersin University State Conservatory Academic Chamber Orchestra.<br><br>In 2013 she won first prize at the 3rd International Harmony Violin Competition, and in 2014 received a distinction at the Grumiaux (Bravo) International Violin Competition in Belgium. She has participated in numerous festivals and masterclasses both in Turkey and abroad, including the Salzburg Music Festival and the Bergerac Music Festival, where she had the opportunity to work with Prof. Dora Schwarzberg, Prof. Ana Chumachenko, Prof. Nataly Boyarsky, Prof. Tedi Papavrami, Prof. Lucas David, Prof. Sergey Kravchenko, Prof. Louise Chisson, Prof. Rudens Turku and Prof. Fedor Rudin.<br><br>After graduating from Mersin University State Conservatory in 2015, she moved to Istanbul for her secondary education and studied at Notre Dame de Sion French High School. During this period she continued her musical training in the Advanced Programme of Mimar Sinan Fine Arts University State Conservatory with Aslı Çivicioğlu, graduating in 2018. Throughout her high school years she also continued working with Louise Chisson and Lili Tchumburidze, and participated as an orchestra member in numerous concerts with Orchestra'Sion under conductor Orçun Orçunsel.<br><br>In 2020 she was accepted to the Musicology Department of Sorbonne University and the Paris Regional Conservatory (CRR de Paris). During her studies in Paris she was an active member of the Sorbonne University Orchestra and the Paris Regional Conservatory Symphony Orchestra, giving regular concerts. In the same period she participated in a traineeship at the Philharmonie de Paris with the Orchestre de Paris, and in 2023 gave a solo concert with Orchestra'Sion.<br><br>After graduating from Sorbonne University and the Paris Regional Conservatory in 2024, she continued her studies with Prof. Louise Chisson at the Schubert Conservatory in Vienna between 2024 and 2025. She is currently continuing her work and is a member of the Izmir Chamber Orchestra." },
 { ad: "Rüzgar Turgay", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/ruzgar_turgay.jpg",
    bio_tr: "Rüzgar Turgay 1996 yılında İstanbul'da doğdu. Müzik eğitimine 2,5 yaşında annesi Yaprak Sandalcı ile, keman eğitimine ise 4,5 yaşında Bulgar pedagog Genoveva Burova ile başladı. 2002–2003 öğrenim yılında İstanbul Üniversitesi Devlet Konservatuarı'na yarı zamanlı olarak girerek aynı hocanın öğrencisi olmaya devam etti. 2003 yılında Edirne'de düzenlenen VI. Uluslararası Genç Müzisyenler Yarışması'nda katılan en küçük yarışmacı olarak mansiyon kazandı. 2004 yılında İstanbul Üniversitesi Devlet Konservatuarı'nda Rus pedagog Venyamin Varshavsky'nin sınıfına girdi. Yarı zamanlı eğitimini tamamladıktan sonra 2014 yılında aynı kurumda lisans eğitimine başladı.<br><br>2018 yılı Nisan ayında Edirne Rotary Kulübü tarafından düzenlenen Ulusal Oda Müziği Yarışması'nda birincilik, Mayıs ayında ise Mersin AKOB Derneği'nin düzenlediği oda müziği yarışmasında üçüncülük ödülünü kazandı. 2019 yılı Mayıs ayında 2. Uluslararası Ulvi Yücelen Oda Müziği Yarışması'nda ikincilik ödülünü elde etti. Konservatuardan arkadaşlarıyla birlikte kurduğu Sillage Ensemble yaylı orkestrasında hem ensemble içinde hem de solist olarak yer aldı.<br><br>2021 yılında İstanbul Üniversitesi Devlet Konservatuarı'nda Yüksek Lisans eğitimini Venyamin Varshavsky ve Sevil Ulucan Weinstein ile tamamladı. Halen aynı çatı altında doktora eğitimini Venyamin Varshavsky ile sürdürmektedir. Aynı yıl Maltepe Üniversitesi Konservatuarı'nda araştırma görevlisi olarak çalışmaya başladı. Üyesi olduğu Büyükada Quartet ile AKOB 5. Ulusal Oda Müziği Yarışması'nda birincilik ödülünü kazandı.",
    bio_en: "Rüzgar Turgay was born in 1996 in Istanbul. He began his musical education at the age of two and a half with his mother Yaprak Sandalcı, and his violin studies at the age of four and a half with Bulgarian pedagogue Genoveva Burova. In the 2002–2003 academic year he enrolled part-time at Istanbul University State Conservatory, where he continued as a student of the same teacher. In 2003 he received an honourable mention at the 6th International Young Musicians Competition in Edirne as the youngest competitor to participate. In 2004 he entered the class of Russian pedagogue Venyamin Varshavsky at Istanbul University State Conservatory. After completing his part-time studies, he began his undergraduate education at the same institution in 2014.<br><br>In April 2018 he won first prize at the National Chamber Music Competition organised by the Edirne Rotary Club, and in May of the same year third prize at the chamber music competition organised by the Mersin AKOB Association. In May 2019 he won second prize at the 2nd International Ulvi Yücelen Chamber Music Competition. He has been a member of the Sillage Ensemble string orchestra, which he co-founded with fellow conservatory students, performing both within the ensemble and as a soloist.<br><br>In 2021 he completed his master's degree at Istanbul University State Conservatory under Venyamin Varshavsky and Sevil Ulucan Weinstein, and is currently pursuing his doctorate at the same institution under Venyamin Varshavsky. That same year he began working as a research assistant at Maltepe University Conservatory. Together with Büyükada Quartet, of which he is a member, he won first prize at the AKOB 5th National Chamber Music Competition." },
  { ad: "Arcan İsenkul", enstruman_tr: "Viyola", enstruman_en: "Viola", foto: "photos/arcan_isenkul.jpg",
    bio_tr: "'Renkli müzikal ifadesi, mükemmel tonu ve sanatsal vizyonu' ile övgü toplayan Arcan İşenkul (2005, Ankara), 2025 yılında prestijli Siemens Sanat Programı'na (Siemens Arts Program) seçilerek bu kapsamda New York Carnegie Hall Weill Music Room sahnesinde konser vermiştir.<br><br>Müzik eğitimine 2014 yılında Bilkent Üniversitesi Müzik Hazırlık Okulu'nda Ece Akyol ile başlayan ve 2023 yılında Cavid Cafer'in sınıfından mezun olan sanatçı, halen eğitimini Frankfurt Müzik ve Sahne Sanatları Üniversitesi'nde (HfMDK Frankfurt) ünlü viyola virtüözü Prof. Tabea Zimmermann ile sürdürmektedir. 6. Uluslararası Oskar Nedbal Viyola Yarışması'nda 'Pirastro Üstün Genç Yetenek Ödülü' ve Uluslararası Prof. Ruşen Güneş Viyola Yarışması'nda birincilik ödülü dahil olmak üzere ulusal ve uluslararası birçok solo ve oda müziği yarışmasında ödüller kazanmıştır.<br><br>Solist olarak Ankara Gençlik Senfoni Orkestrası, Aurora Oda Orkestrası, Başkent Oda Orkestrası, Bilkent Gençlik Senfoni Orkestrası, Bilkent Senfoni Orkestrası, Bursa Devlet Senfoni Orkestrası, Eskişehir Büyükşehir Belediyesi Senfoni Orkestrası, Hacettepe Senfoni Orkestrası ve Luzerne Music Center Orkestrası eşliğinde konserler vermiştir.<br><br>Tutkulu bir oda müzisyeni olan İşenkul; Schwetzinger SWR Festivali, Yellow Barn, Bilkent Müzik Günleri, Festival du Haut-Var, Luzerne Music Center, JM International Chamber Music Campus ve G. Henle Oda Müziği Akademisi gibi festivallerde yer almıştır. Oda müziği partnerleri arasında Jaan Bossier, Lucas Fels, Stefan Hempel, Sebastian Klinger, Angelika Merkle, Tim Vogler ve Tabea Zimmermann gibi pek çok tanınmış sanatçı bulunmaktadır. Ayrıca Amihai Grosz, Marion Leleu, Tatjana Masurenko, German Tcakulov, Heime Müller ve Günter Pichler gibi saygın müzisyenlerin ustalık sınıflarına katılmıştır.<br><br>Orkestra müzisyeni olarak Concertgebouworkest Young, Concertgebouworkest String Fling ve Verbier Festival Junior Orchestra gibi projelerde solo viyola olarak yer almış; Bilkent Senfoni Orkestrası, Bilkent Gençlik Senfoni Orkestrası, Ankara Gençlik Senfoni Orkestrası ve Türkiye Gençlik Filarmoni Orkestrası ile performanslar sergilemiştir.<br><br>Sanatsal vizyonunu farklı mecralara da taşıyan İşenkul, klasik eğitimini çağdaş ekran müziğiyle harmanlamaktadır. Bu kapsamda HBO Max için Jasmine (2025) ile Bir Ömrün Sonbaharı (2025) filminin orijinal müziklerini Çetin Özen iş birliğiyle bestelemiştir.<br><br>Arcan İşenkul, Alman Enstrüman Fonu (Deutsche Stiftung Musikleben) bursiyeri olarak kendisine sağlanan 1973 yapımı Josef Kantuscher Op. 310 viyola ile sanat yolculuğuna devam etmektedir.",
    bio_en: "Praised for his 'colourful musical expression, exquisite tone and artistic vision,' Arcan İşenkul (born 2005, Ankara) was selected for the prestigious Siemens Arts Programme (Siemens Arts Program) in 2025 and performed at Carnegie Hall's Weill Music Room in New York as part of this programme.<br><br>Having begun his musical education in 2014 at Bilkent University Music Preparatory School with Ece Akyol and graduated from the class of Cavid Cafer in 2023, he is currently continuing his studies at the Frankfurt University of Music and Performing Arts (HfMDK Frankfurt) with the renowned viola virtuoso Prof. Tabea Zimmermann. He has won prizes in numerous national and international solo and chamber music competitions, including the 'Pirastro Outstanding Young Talent Award' at the 6th International Oskar Nedbal Viola Competition and first prize at the International Prof. Ruşen Güneş Viola Competition.<br><br>As a soloist he has performed with the Ankara Youth Symphony Orchestra, Aurora Chamber Orchestra, Başkent Chamber Orchestra, Bilkent Youth Symphony Orchestra, Bilkent Symphony Orchestra, Bursa State Symphony Orchestra, Eskişehir Metropolitan Municipality Symphony Orchestra, Hacettepe Symphony Orchestra and the Lucerne Music Center Orchestra.<br><br>A passionate chamber musician, İşenkul has participated in festivals including the Schwetzinger SWR Festival, Yellow Barn, Bilkent Music Days, Festival du Haut-Var, Lucerne Music Center, JM International Chamber Music Campus and the G. Henle Chamber Music Academy. His chamber music partners include many distinguished artists such as Jaan Bossier, Lucas Fels, Stefan Hempel, Sebastian Klinger, Angelika Merkle, Tim Vogler and Tabea Zimmermann. He has also participated in masterclasses given by respected musicians including Amihai Grosz, Marion Leleu, Tatjana Masurenko, German Tcakulov, Heime Müller and Günter Pichler.<br><br>As an orchestral musician he has participated as principal viola in projects including Concertgebouworkest Young, Concertgebouworkest String Fling and Verbier Festival Junior Orchestra, and has performed with the Bilkent Symphony Orchestra, Bilkent Youth Symphony Orchestra, Ankara Youth Symphony Orchestra and the Turkey Youth Philharmonic Orchestra.<br><br>Extending his artistic vision into new domains, İşenkul blends his classical training with contemporary screen music. In this context he has co-composed the original scores for Jasmine (2025) and Bir Ömrün Sonbaharı (2025) for HBO Max, in collaboration with Çetin Özen.<br><br>Arcan İşenkul continues his artistic journey as a scholarship holder of the German Instrument Fund (Deutsche Stiftung Musikleben), playing on a 1973 Josef Kantuscher Op. 310 viola provided to him by the foundation." },
  { ad: "Emir Kemancı", enstruman_tr: "Viyola", enstruman_en: "Viola", foto: "photos/emir_kemanci.jpg",
    bio_tr: "İstanbul doğumlu Emir Kemancı, viyola eğitimine 2011 yılında MSGSÜ Devlet Konservatuarı'nda hocası Göknil Özkök Sezener ile başladı. Solist olarak ilk konserini MSGSÜ Devlet Konservatuvarı Genç Orkestra ile 2015 yılında verdi. Aynı yıl Çeşme Klasik Müzik Festivali kapsamında Sybille Langmaack ile masterclass çalışmalarına katıldı. 2016 yılında bir kez daha Genç Orkestra ile solist olarak konser veren Kemancı, aynı yıl Münih Senfoni'nin solo viyola sanatçısı Jano Lisboa ile çalıştı. Borusan Quartet'in viyola sanatçısı Efdal Altun, HMDK Stuttgart'tan Prof. Andra Darzins ve Prof. Tatjana Masurenko ile masterclass çalışmaları gerçekleştirmiştir. Camerata Saygun, Fazıl Say Festival Orkestrası, AIMA Festival Orkestrası, İstanbul Oda Orkestrası, CRR Senfoni Orkestrası ve Borusan Filarmoni Orkestrası'nda görev almıştır.<br><br>2017 yılında Doğuş Çocuk Filarmoni Orkestrası seçmelerinde başarılı olup grup şefi olarak katıldı. Aynı yıl Türkiye Ulusal Gençlik Filarmoni Orkestrası seçmelerinde de başarılı olan sanatçı, orkestra ile Avrupa turnesinde Berlin Konzerthaus, Prag Rudolfinum Dvořák Hall ve Venedik'in en eski ve ihtişamlı tarihi yapılarından biri olan Scuola Grande di San Rocco gibi önemli konser salonlarında konserler verdi.<br><br>2018 yılında İş Sanat'ın düzenlediği Meriç Soylu Parlayan Yıldızlar serisinde resital vererek birinci ödülü aldı. Aynı yıl yeniden Türkiye Ulusal Gençlik Filarmoni Orkestrası ile Avrupa turnesine çıkan sanatçı, orkestranın viyola grup şefliğini üstlenerek Prag, Varşova, Slovakya, Budapeşte ve Viyana gibi Avrupa'nın önde gelen şehirlerinde konserler verdi. Orkestra, Viyana'nın önemli kültür merkezlerinden Radio Kulturhaus'ta konser verdi; bu konser Avusturya Radyosu yayını aracılığıyla büyük dinleyici kitlelerine ulaştı.<br><br>2018–2019 İş Sanat konser sezonu açılış konserinde Cumhurbaşkanlığı Senfoni Orkestrası ile solist olarak yer aldı. 2019 yılında Sedat Güzin Gürel Sanat ve Bilim Vakfı'nın düzenlediği ulusal gençlik yarışmasında ikincilik ödülünü kazanan sanatçı, İstanbul Devlet Senfoni Orkestrası ile Walton Viyola Konçertosu'nu seslendirdi. Aynı dönemde Cihat Aşkın'ın sunduğu TRT radyo programına katılarak radyoda resital verdi. 2021 yılında Cihat Aşkın ile gerçekleştirdiği Händel-Halvorsen Passacaglia video kaydı sosyal medya mecralarında yayınlandı.<br><br>Eğitimini Mimar Sinan Güzel Sanatlar Üniversitesi İstanbul Devlet Konservatuvarı'nda tamamlayan Emir Kemancı, 2024 yılında İstanbul Devlet Senfoni Orkestrası'nda göreve başlamıştır.",
    bio_en: "Born in Istanbul, Emir Kemancı began his viola studies in 2011 at MSGSÜ State Conservatory with his teacher Göknil Özkök Sezener. He gave his first solo concert with the MSGSÜ State Conservatory Youth Orchestra in 2015. That same year he participated in masterclasses with Sybille Langmaack as part of the Çeşme Classical Music Festival. In 2016 he performed once more as soloist with the Youth Orchestra and worked with Jano Lisboa, solo violist of the Munich Symphony. He has also participated in masterclasses with Efdal Altun of the Borusan Quartet, and with Prof. Andra Darzins and Prof. Tatjana Masurenko from HMDK Stuttgart. He has performed with Camerata Saygun, the Fazıl Say Festival Orchestra, AIMA Festival Orchestra, Istanbul Chamber Orchestra, CRR Symphony Orchestra and Borusan Philharmonic Orchestra.<br><br>In 2017 he was accepted into the Doğuş Children's Philharmonic Orchestra as section leader. That same year he was admitted to the Turkey National Youth Philharmonic Orchestra, with which he performed on a European tour at major concert halls including Berlin Konzerthaus, Prague Rudolfinum Dvořák Hall and the Scuola Grande di San Rocco in Venice, one of the oldest and most magnificent historic buildings in the city.<br><br>In 2018 he gave a recital in İş Sanat's Meriç Soylu Rising Stars series and received first prize. That same year he embarked on another European tour with the Turkey National Youth Philharmonic Orchestra, this time serving as its principal violist, and performed concerts in leading European cities including Prague, Warsaw, Slovakia, Budapest and Vienna. The orchestra gave a concert at Radio Kulturhaus, one of Vienna's important cultural centres, which was broadcast on Austrian Radio and reached a wide audience.<br><br>He appeared as soloist with the Presidential Symphony Orchestra at the opening concert of the 2018–2019 İş Sanat concert season. In 2019 he won second prize at the national youth competition organised by the Sedat Güzin Gürel Foundation for Art and Science and performed Walton's Viola Concerto with the Istanbul State Symphony Orchestra. During the same period he participated in Cihat Aşkın's TRT radio programme and gave a recital on air. In 2021 his video recording of Händel-Halvorsen's Passacaglia with Cihat Aşkın was published on social media platforms.<br><br>Having completed his education at Mimar Sinan Fine Arts University Istanbul State Conservatory, Emir Kemancı joined the Istanbul State Symphony Orchestra in 2024." }, 
  { ad: "Arda Aykut", enstruman_tr: "Viyola", enstruman_en: "Viola", foto: "photos/arda_aykut.jpg",
    bio_tr: "Arda Aykut 2002 yılında Ankara'da doğdu. 2012 yılında Hacettepe Üniversitesi Ankara Devlet Konservatuvarı'na girerek viyola eğitimine Prof. Bige Bediz Kınıklı ile başladı. Lise son sınıfında dönem birincisi olarak mezun oldu. 2021 yılından itibaren UdK Berlin'de (Universität der Künste Berlin) Prof. Julia Rebekka-Brembeck Adler ile solo lisans eğitimine ve Artemis Quartet'ten Vineta Sareika ve Gregor Sigl ile oda müziği eğitimine başladı; master eğitimine de aynı şekilde devam etmektedir.<br><br>Yıllar içinde Hacettepe Gençlik Senfoni Orkestrası, Ankara Gençlik Senfoni Orkestrası, Doğuş Çocuk Senfoni Orkestrası, Türkiye Gençlik Filarmoni Orkestrası, Türksoy Kızılorda Oda Orkestrası, UdK Berlin Senfoni Orkestrası, Musica Inaudita ve Junges Philharmonisches Orchester München gibi orkestralarda yer aldı. Hem yurtiçinde hem yurtdışında Nobuko Imai, Marco Misciagna, Daniel Schwarz, Andreas Willwohl, Pauline Sachse, Thomas Riebl, Hartmut Rohde, Tatjana Masurenko, Julia Rebekka Brembeck-Adler, Hariolf Schlichtig ve Ferenc Gabor ile; üyesi olduğu Varyon Quartet aracılığıyla ise Artemis Quartet, Casals Quartet, Kuss Quartet ve Tokyo Quartet gibi topluluklarla çalışma şansı buldu.<br><br>Young Euro Classic, D'Accord Das Klassik Festival, Crescendo Festival ve Sommermusik Nagold gibi festivallerde; Berlin Konzerthaus, München Herkulessaal, Salzburg Stiftung Mozart Großersaal ve Berlin Philharmonie gibi önemli konser salonlarında orkestra, solo ve oda müziği alanlarında çok sayıda konserde yer aldı, grup şefliği yaptı ve Sir Simon Rattle ile çalışma fırsatı buldu. Üyesi olduğu Varyon Quartet ile Japonya'da konser turnesi gerçekleştirdi. Ayrıca Eskişehir Büyükşehir Belediyesi Senfoni Orkestrası, Ankara Gençlik Senfoni Orkestrası, Hacettepe Senfoni Orkestrası ve Loh-Orchester Sondershausen ile solist olarak konserler verdi.<br><br>Yarışma ödülleri arasında 2019 yılında İstanbul Devlet Senfoni Orkestrası Genç Yetenek Yarışması'nda 4.lük, Online Klasik Müzik Akademisi Müzik Yarışması'nda en iyi Türk eseri performansı ödülü, ISCART Müzik Yarışması'nda 4.lük, King's Peak Uluslararası Müzik Yarışması'nda kendi yaş kategorisinde 1.lik, Online Polonya Yaylı Çalgılar Yarışması'nda mansiyon ve Prof. Ruşen Güneş Uluslararası Viyola Yarışması'nda 3.lük yer almaktadır. Üyesi olduğu Varyon Quartet ile Japonya'da Munetsugu Hall String Quartet Competition'da ve Almanya'da Alice Samter Stiftung Kammermusikwettbewerb'de 1.lik ödülleri ve Seyirci Özel Ödülü'nü kazandı.<br><br>Lisans eğitimini UdK Berlin'de en üst dereceyle tamamladıktan sonra master eğitimine de aynı okulda devam etmektedir. Eğitimi Dr. Herbert und Anne-Marie Lembcke Ad-Infinitum-Foundation und Lucia-Loeser-Stiftung ve Kurt und Felicitas Vössing Stiftung vakıfları tarafından desteklenmiş; okulu tarafından Deutschlandstipendium alma hakkını kazanmıştır.",
    bio_en: "Arda Aykut was born in 2002 in Ankara. In 2012 he entered Hacettepe University Ankara State Conservatory and began his viola studies with Prof. Bige Bediz Kınıklı. He graduated at the top of his class in his final year of secondary school. Since 2021 he has been studying at UdK Berlin (Universität der Künste Berlin) with Prof. Julia Rebekka-Brembeck Adler in solo undergraduate studies, and has received chamber music coaching from Artemis Quartet members Vineta Sareika and Gregor Sigl; he continues in the same manner for his master's degree.<br><br>Over the years he has been a member of the Hacettepe Youth Symphony Orchestra, Ankara Youth Symphony Orchestra, Doğuş Children's Symphony Orchestra, Turkey Youth Philharmonic Orchestra, Türksoy Kyzylorda Chamber Orchestra, UdK Berlin Symphony Orchestra, Musica Inaudita and the Junges Philharmonisches Orchester München. Both in Turkey and abroad he has had the opportunity to work with Nobuko Imai, Marco Misciagna, Daniel Schwarz, Andreas Willwohl, Pauline Sachse, Thomas Riebl, Hartmut Rohde, Tatjana Masurenko, Julia Rebekka Brembeck-Adler, Hariolf Schlichtig and Ferenc Gabor, as well as with ensembles including the Artemis Quartet, Casals Quartet, Kuss Quartet and Tokyo Quartet through his work with Varyon Quartet.<br><br>He has performed in numerous concerts as an orchestral musician, soloist and chamber musician at festivals including Young Euro Classic, D'Accord Das Klassik Festival, Crescendo Festival and Sommermusik Nagold, and at important venues including Berlin Konzerthaus, München Herkulessaal, Salzburg Stiftung Mozart Großersaal and Berlin Philharmonie. He has also served as section leader and had the opportunity to work with Sir Simon Rattle. He undertook a concert tour of Japan with Varyon Quartet. He has additionally given solo concerts with the Eskişehir Metropolitan Municipality Symphony Orchestra, Ankara Youth Symphony Orchestra, Hacettepe Symphony Orchestra and Loh-Orchester Sondershausen.<br><br>His competition prizes include 4th prize at the Istanbul State Symphony Orchestra Young Talent Competition in 2019, the best performance of a Turkish work award at the Online Classical Music Academy Competition, 4th prize at the ISCART Music Competition, 1st prize in his age category at the King's Peak International Music Competition, an honourable mention at the Online Polish String Instrument Competition, and 3rd prize at the Prof. Ruşen Güneş International Viola Competition. With Varyon Quartet he won 1st prize and the Audience Special Prize at the Munetsugu Hall String Quartet Competition in Japan and at the Alice Samter Stiftung Kammermusikwettbewerb in Germany.<br><br>Having completed his undergraduate degree at UdK Berlin with the highest distinction, he is continuing his master's studies at the same institution. His studies have been supported by the Dr. Herbert und Anne-Marie Lembcke Ad-Infinitum-Foundation und Lucia-Loeser-Stiftung and the Kurt und Felicitas Vössing Stiftung, and he has been awarded the Deutschlandstipendium by his university." },
  { ad: "Beste Yıldız", enstruman_tr: "Viyolonsel", enstruman_en: "Cello", foto: "photos/beste_yildiz.jpg",
    bio_tr: "Beste Yıldız, 2001 yılında Adana'da doğdu. Müzik eğitimine 9 yaşında Çukurova Üniversitesi Devlet Konservatuvarı'nda Viatcheslav Kainov ile başladı. Lise öğrenimini tamamladıktan sonra 2019 yılında Den Haag Kraliyet Konservatuvarı'nda Larissa Groeneveld'in sınıfına kabul edildi. Lisans eğitimini 2023 yılında üstün başarıyla tamamladıktan hemen sonra Yüksek Lisans eğitiminde Larissa Groeneveld'in sınıfından ayrıcalık ödülüyle mezun oldu. Eğitim yılları süresince Dr. Nejat Eczacıbaşı Vakfı'nın müzik bursiyeri olmuş ve Den Haag Kraliyet Konservatuvarı tarafından 'Excellence Scholarship' bursuna layık görülmüştür.<br><br>Eğitimi boyunca Maria Kliegel, Jens Peter Maintz, Giovanni Sollima, Jean-Guihen Queyras, Kyril Zlotnikov, Lucia Swarts, Joachim Eijlander, Umberto Clerici, Harro Ruijsenaars, Zlatomir Fung, Sietse-Jan Weijenberg, Çağ Erçağ, Nil Kocamangil, Dilbağ Tokay ve Fazıl Say gibi uluslararası platformlarda tanınmış değerli sanatçılarla çalışma fırsatı buldu.<br><br>2013 yılında Uluslararası Belgrad Müzik Yarışması'nda birincilik alan Beste, 2024 yılı Ocak ayında Kerem Tunçer yönetimindeki Çukurova Devlet Senfoni Orkestrası ile Çaykovski'nin Rokoko Varyasyonları'nı seslendirdi. Hollanda'nın ve Türkiye'nin önde gelen festivallerinden Ankara Müzik Festivali, Delft Chamber Music Festival, Festival Dag in de Branding ve Cellowercken Zutphen kapsamında sahne aldı; besteci Myrto Nizami'nin 'Gone in No Time' adlı solo çello eserini ve besteci Guus Jansen'in 'Concertino for 4 celli and ensemble' adlı eserini Cello Biënnale Band ile birlikte seslendirdi.<br><br>Solo performanslarının yanı sıra Doğuş Çocuk Senfoni Orkestrası'nda ve Türkiye Ulusal Gençlik Filarmoni Orkestrası'nda çello grup şefi olarak Avrupa'nın birçok ülkesinde sahne aldı. 2023 yılında Hollanda Ulusal Gençlik Orkestrası'nın başçellisti olarak Wouter Vossen ile birlikte ülke genelinde konserler verdi. Üyesi olduğu oda müziği toplulukları Kali Ensemble, Numen Ensemble, ABO Trio, HarmonEast ve Ensemble Orochi ile aktif olarak sahne almaktadır.<br><br>Rotterdam Filarmoni Orkestrası'nın orkestra akademisi programına seçilmiş olup 2026–2027 sezonunda akademisyen sanatçı olarak konserler verecektir. The Netherlands Musical Instrument Foundation tarafından kendisine verilen 1870 Gaetano Chiocchi yapımı, 'Carlo Antonio Testore' etiketli İtalyan çellosunu çalmaya devam etmektedir.",
