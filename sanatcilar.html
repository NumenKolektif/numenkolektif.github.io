<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanatçılar — Numen Kolektif</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: #F5F3EE;
      color: #1a1a1a;
    }

    .site-header {
      background: #1E2D7A;
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      text-decoration: none;
    }

    .site-logo {
      width: 144px;
      height: 144px;
      object-fit: contain;
      background: white;
      border-radius: 8px;
      padding: 6px;
    }

    .site-name {
      color: white;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.06em;
    }

    .nav-tabs {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .tab {
      padding: 10px 20px;
      color: #1E2D7A;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Cormorant Garamond', Georgia, serif;
      cursor: pointer;
      border: none;
      background: #C8D8FF;
      border-radius: 6px;
      letter-spacing: 0.04em;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      white-space: nowrap;
      transition: background 0.15s;
      text-decoration: none;
      display: inline-block;
    }

    .tab:hover { background: #DDEAFF; }
    .tab.active {
      background: #DDEAFF;
      border-bottom: 3px solid #E07B00;
      border-radius: 6px 6px 3px 3px;
    }

    .hero-band {
      width: 100%;
      height: 340px;
      background: #1E2D7A url('background.jpg') center center / cover no-repeat;
    }

    .content-area {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 40px;
    }

    .page-title {
      font-size: 13px;
      color: #1E2D7A;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 700;
      border-left: 3px solid #C0392B;
      padding-left: 12px;
      margin-bottom: 32px;
    }

    /* Alt sekme butonları */
    .alt-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .alt-btn {
      padding: 12px 28px;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      border: 2px solid #1E2D7A;
      border-radius: 6px;
      background: transparent;
      color: #1E2D7A;
      transition: all 0.2s;
    }

    .alt-btn:hover { background: #1E2D7A; color: white; }
    .alt-btn.active { background: #1E2D7A; color: white; }

    /* Panel */
    .panel { display: none; }
    .panel.active { display: block; }

    /* Sanatçı kartları */
    .sanatci-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 32px;
    }

    .sanatci-kart {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: box-shadow 0.2s;
    }

    .sanatci-kart:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.15); }

    .kart-foto {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      object-position: top;
      display: block;
    }

    .kart-foto-placeholder {
      width: 100%;
      aspect-ratio: 3/4;
      background: #e8e4dc;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 13px;
      letter-spacing: 0.06em;
    }

    .kart-bilgi {
      padding: 16px 20px;
    }

    .kart-ad {
      font-size: 20px;
      font-weight: 600;
      color: #1E2D7A;
      margin-bottom: 4px;
    }

    .kart-enstruman {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #C0392B;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #F5F3EE;
      border-radius: 10px;
      max-width: 760px;
      width: 100%;
      overflow: hidden;
      position: relative;
    }

    .modal-kapat {
      position: absolute;
      top: 16px;
      right: 16px;
      background: #1E2D7A;
      color: white;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      line-height: 32px;
      text-align: center;
      z-index: 10;
    }

    .modal-ust {
      display: flex;
      gap: 0;
    }

    .modal-foto {
      width: 240px;
      flex-shrink: 0;
      object-fit: cover;
      object-position: top;
    }

    .modal-foto-placeholder {
      width: 240px;
      flex-shrink: 0;
      background: #e8e4dc;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 13px;
      min-height: 300px;
    }

    .modal-baslik {
      padding: 28px 32px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .modal-ad {
      font-size: 28px;
      font-weight: 700;
      color: #1E2D7A;
      margin-bottom: 6px;
    }

    .modal-enstruman {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #C0392B;
      margin-bottom: 16px;
    }

    .modal-biyografi {
      padding: 24px 32px;
      border-top: 1px solid #e0dbd2;
    }

    .modal-biyografi p {
      font-size: 16px;
      line-height: 1.85;
      color: #2a2a2a;
      margin-bottom: 12px;
    }

    .modal-biyografi p:last-child { margin-bottom: 0; }

    /* Footer */
    .site-footer {
      background: #1E2D7A;
      padding: 24px 40px;
      margin-top: 48px;
    }

    .footer-contacts {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.8);
      font-size: 15px;
      text-decoration: none;
    }

    .contact-row:hover { color: white; }

    .contact-icon {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-gmail { background: white; }
    .icon-instagram { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .icon-spotify { background: #1DB954; }

    @media (max-width: 640px) {
      .site-header { padding: 14px 20px; flex-direction: column; align-items: flex-start; }
      .site-logo { width: 100px; height: 100px; }
      .site-name { font-size: 22px; }
      .nav-tabs { width: 100%; }
      .tab { padding: 8px 14px; font-size: 13px; }
      .hero-band { height: 200px; }
      .content-area { padding: 32px 20px; }
      .sanatci-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
      .modal-ust { flex-direction: column; }
      .modal-foto, .modal-foto-placeholder { width: 100%; min-height: 280px; }
      .site-footer { padding: 20px; }
    }
  </style>
</head>

<script>
const icracilar = [
  {
    ad: "İdil Yunkuş", enstruman: "Keman", foto: "photos/idil_yunkus.jpg",
    bio: `İdil Yunkuş, keman eğitimine beş yaşında babası Selahattin Yunkuş ile başlamış, Mersin Üniversitesi Devlet Konservatuvarı'nda Lily Tchumburidze ile devam etmiş ve 2017 yılında Profesör Çiğdem İyicil'in sınıfında lise eğitimini Mimar Sinan Güzel Sanatlar Üniversitesi İstanbul Devlet Konservatuvarı'nda tamamlamıştır. Amsterdam Konservatuarı hazırlık sınıfında Ilya Grubert ile çalışmış, ardından Lahey Kraliyet Konservatuvarı'nda Theodora Geraets ve Janet Krause ile eğitimini sürdürmüş ve 2023 yılında üstün dereceyle mezun olmuştur.<br><br>İstanbul Devlet Senfoni Orkestrası, Eskişehir Büyükşehir Belediyesi Senfoni Orkestrası, Bursa Bölge Devlet Senfoni Orkestrası ve Hacettepe Üniversitesi Devlet Konservatuvarı Senfoni Orkestrası eşliğinde Stravinsky, Mendelssohn, Vieuxtemps ve Erkin'in keman konçertolarını solist olarak seslendirmiştir.<br><br>Eylül 2023'te Keep an Eye Vakfı tarafından "Yılın Genç Müzisyeni" ödülüne, Eylül 2024'te ise Het Kerstjes Kurumu tarafından "Hollanda Keman Bursu" ödülüne layık görülmüştür. Dr. Nejat Eczacıbaşı Müzik Bursiyeri olarak Hollanda'da sürdürdüğü yüksek lisansını 2025 Haziran'ında cum laude derecesiyle tamamlamıştır. Mart 2024 itibarıyla Hollanda Müzik Enstrümanları Fonu (NMF) tarafından kendisine verilen 1800 yapımı Johannes Cuypers keman ile çalmaktadır.`
  },
  {
    ad: "Sofiko Tchumburidze", enstruman: "Keman", foto: "photos/sofiko_tchumburidze.jpg",
    bio: `2000 yılında Mersin'de Gürcü müzisyen bir ailenin çocuğu olarak dünyaya gelen Sofiko Tchumburidze, keman eğitimine annesi Lily Tchumburidze ile başlamıştır. Hochschule für Musik und Theater München'deki lisans eğitimini Prof. Julia Fischer'ın öğrencisi olarak tamamlayan sanatçı, yüksek lisans eğitimini de aynı hocayla sürdürmektedir.<br><br>Solist olarak Türkiye Cumhuriyeti Cumhurbaşkanlığı Senfoni Orkestrası, Çukurova Devlet Senfoni Orkestrası, Bursa Devlet Senfoni Orkestrası ve Antalya Senfoni Orkestrası ile sahne almıştır. Alpha Classics için Howard Griffiths yönetiminde Mozarteum Orkestrası ile CD kaydı gerçekleştirmiştir. 2022 yılından itibaren Daniel Barenboim yönetimindeki Divan Orkestrası ile Avrupa'nın önde gelen salonlarında konserler vermiştir.<br><br>ÇEV Sanat bursiyeri olan Tchumburidze, Deutsche Stiftung Musikleben tarafından kendisine verilen 1890 yapımı Lorenzo Ventapane kemanı ile kariyerine devam etmektedir.`
  },
  {
    ad: "Ilgın Top", enstruman: "Keman", foto: "photos/ilgin_top.jpg",
    bio: `Uluslararası alanda ödüller kazanmış kemancı Ilgın Top, hem solist hem de oda müzisyeni olarak dikkat çeken bir kariyere sahiptir. Lisans eğitimini Maastricht Konservatuvarı'nda Boris Belkin'in sınıfında üstün başarıyla tamamlamıştır.<br><br>Bilkent Senfoni Orkestrası, İzmir ve İstanbul Devlet Senfoni Orkestraları, Bursa ve Eskişehir Senfoni Orkestraları ve Galiçya Kraliyet Filarmoni Orkestrası gibi topluluklarla konserler vermiştir. Suna Kan Keman Yarışması ve Arthur Grumiaux Keman Yarışması gibi saygın uluslararası yarışmalarda birincilik elde etmiştir. 2023 yılında Aydın Gün Teşvik Ödülü'nü kazanmıştır.<br><br>Halen Hannover Müzik ve Tiyatro Yüksekokulu'nda Krzysztof Wegrzyn ile Konzertexamen programına devam etmektedir. Deutsche Stiftung Musikleben tarafından kendisine tahsis edilen Stephan von Baehr yapımı özel bir kemanla çalmaktadır.`
  },
  {
    ad: "Doğa Altınok", enstruman: "Keman", foto: "photos/doga_altinok.jpg",
    bio: `2000 doğumlu Doğa Altınok, keman eğitimine 2007'de Çukurova Üniversitesi Devlet Konservatuvarı'nda başlamıştır. Uluslararası kariyerinde Arthur Grumiaux Keman Yarışması (Brüksel, 2020 — 1.lik), Andrea Postacchini Yarışması (İtalya, 2015 — 1.lik) ve Young Virtuosos Yarışması (Sofya, 2015 — 1.lik) dahil pek çok prestijli yarışmada ödüller kazanmıştır.<br><br>Viyana Müzik ve Sahne Sanatları Üniversitesi'nde Prof. Dora Schwarzberg ve Prof. Anton Sorokow ile eğitimini sürdürmüştür. İzmir, Antalya, Bursa, Cumhurbaşkanlığı, İstanbul Devlet Senfoni Orkestraları ile konserler vermiş; Avrupa'nın önde gelen şehirlerinde resital ve oda müziği konserleri gerçekleştirmiştir.<br><br>Güher & Süher Pekinel "Dünya Sahnelerinde Genç Müzisyenler" Projesi dahilinde TÜPRAŞ tarafından desteklenmiştir. Ocak 2023'ten itibaren Viyana'daki Tonkünstler Orkestrası'nda ikinci kemanların yardımcı grup şefi pozisyonunda görev yapmaktadır.`
  },
  {
    ad: "Yağmur Tuna", enstruman: "Keman", foto: "photos/yagmur_tuna.jpg",
    bio: `Yağmur Tuna, 2005 yılında Eskişehir'de doğdu. 2015 yılında Anadolu Üniversitesi Devlet Konservatuvarı'nda konservatuvar eğitimine başladı. 2020 yılında Moskova Çaykovski Konservatuvarı Merkez Müzik Okulu'nu kazandı.<br><br>Paris Nouvelles Etoiles Yarışması'nda (2023 — 1.lik), Uluslararası Stravinsky Yarışması'nda (St. Petersburg, 2024 — 1.lik) ve Uluslararası YSAYE Yarışması'nda (Brüksel, 2022 — 3.lük) ödüller kazanmıştır. 2025'te Bolşoy Tiyatrosu'nda konser vermiş, Eskişehir ve İstanbul Devlet Senfoni Orkestraları ile solist olarak sahne almıştır.<br><br>Moskova Çaykovski Konservatuvarı'nı yabancı öğrenciler arasında en yüksek puanla kazanmış olup Prof. Alexander Vinnitski'nin sınıfında eğitimini sürdürmektedir. Enka Vakfı Lale Tara Sanat Bursu bursiyeridir.`
  },
  {
    ad: "İdil Olgar", enstruman: "Keman", foto: "photos/idil_olgar.jpg",
    bio: `2006 yılında Mersin'de doğan İdil Olgar, keman eğitimine 2012 yılında Mersin Üniversitesi Devlet Konservatuvarı'nda başladı. Çeşitli uluslararası yarışmalarda ödüller kazanan sanatçı; 2018'de Prag'da ikincilik, 2018'de Budapeşte'de birincilik elde etmiştir.<br><br>2024 yılında İzmir Senfoni Orkestrası ile Sibelius Keman Konçertosu'nu solist olarak seslendirmiştir. 2025 yılında oda müziği grubuyla Lamont School of Music yarışmasını kazanarak Colorado Müzik Festivali'ne davet edilmiş ve CPR radyo istasyonu ile kayıt yapmıştır. 2026 yılından itibaren Jean Baptiste Vuillaume yapımı keman ile çalmaktadır.`
  },
  {
    ad: "İlke Işı Tuncer", enstruman: "Keman", foto: "photos/ilke_isi_tuncer.jpg",
    bio: `2005 yılında Ankara'da doğan İlke Işı Tuncer, 2011 yılında Bilkent Üniversitesi Müzik ve Sahne Sanatları Fakültesi'nde keman eğitimine başladı. 2022 yılından bu yana Belçika'daki Musica Mundi School'da eğitimini sürdürmektedir.<br><br>Berlin Konzerthaus, Prag Rudolfinum, Bozar Brussels ve Roma Santa Cecilia gibi prestijli salonlarda sahne almıştır. Sırbistan Uluslararası Müzik Yarışması'nda 1.lik, Ulusal Genç Yetenekler Yarışması'nda Grand Prix, 2025'te 3. Arnold Rose Uluslararası Keman Yarışması'nda "Wiener Klassik" özel ödülüne layık görülmüştür.<br><br>Türkiye Gençlik Filarmoni Orkestrası'nda başkemancı olarak seçilmiş, 48. İstanbul Müzik Festivali kapsamında Süreyya Operası'nda sahne almıştır. 2025 yılında Royal College of Music London'da tam burslu eğitim hakkı kazanmıştır.`
  },
  {
    ad: "Ada Enön", enstruman: "Keman", foto: null,
    bio: `31 Ekim 2001 tarihinde İstanbul'da doğan Ada Enön, keman çalışmalarına 2007 yılında Lili Tchumburidze'nin öğrencisi olarak başladı. 2013'te 3. Uluslararası Harmony Keman Yarışması'nda birincilik, 2014'te Grumiaux Uluslararası Keman Yarışması'nda mansiyon ödülü aldı.<br><br>2020 yılında Sorbonne Üniversitesi Müzikoloji Bölümü ve Paris Bölge Konservatuvarı'na kabul edildi. Paris'teki öğrenimi boyunca Orchestre de Paris bünyesinde Philharmonie de Paris'de staj programına katıldı. 2024-2025 yılları arasında Viyana'daki Schubert Konservatuvarı'nda Prof. Louise Chisson ile çalışmalarını sürdürdü. Günümüzde İzmir Oda Orkestrası üyesidir.`
  },
  {
    ad: "Rüzgar Turgay", enstruman: "Keman", foto: "photos/ruzgar_turgay.jpg",
    bio: `Rüzgar Turgay 1996 yılında İstanbul'da doğdu. Keman eğitimine 4,5 yaşında başladı; 2004 yılında İstanbul Üniversitesi Devlet Konservaarı'nda Venyamin Varshavsky'nin sınıfına girdi. 2021 yılında Yüksek Lisans eğitimini tamamlamış olup halen aynı kurumda doktora eğitimine devam etmektedir.<br><br>Sillage Ensemble yaylı orkestrasının kurucu üyesidir. Büyükada Quartet ile AKOB 5. Ulusal Oda Müziği Yarışması'nda birincilik ödülü kazanmıştır. 2021 yılından itibaren Maltepe Üniversitesi Konservatuarı'nda araştırma görevlisi olarak çalışmaktadır.`
  },

function kartOlustur(sanatci, index, tip) {
  const div = document.createElement('div');
  div.className = 'sanatci-kart';
  div.onclick = () => modalAc(sanatci);

  const fotoHTML = sanatci.foto
    ? `<img class="kart-foto" src="${sanatci.foto}" alt="${sanatci.ad}">`
    : `<div class="kart-foto-placeholder">Fotoğraf</div>`;

  div.innerHTML = `
    ${fotoHTML}
    <div class="kart-bilgi">
      <div class="kart-ad">${sanatci.ad}</div>
      <div class="kart-enstruman">${sanatci.enstruman}</div>
    </div>
  `;
  return div;
}

function modalAc(sanatci) {
  document.getElementById('modal-ad').textContent = sanatci.ad;
  document.getElementById('modal-enstruman').textContent = sanatci.enstruman;

  const fotoAlani = document.getElementById('modal-foto-alani');
  if (sanatci.foto) {
    fotoAlani.innerHTML = `<img class="modal-foto" src="${sanatci.foto}" alt="${sanatci.ad}">`;
  } else {
    fotoAlani.innerHTML = `<div class="modal-foto-placeholder">Fotoğraf</div>`;
  }

  const bioDiv = document.getElementById('modal-bio');
  bioDiv.innerHTML = sanatci.bio.split('<br><br>').map(p => `<p>${p}</p>`).join('');

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function modalKapat(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }
}

document.querySelector('.modal-kapat').onclick = () => {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
};

function gosterPanel(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.alt-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// Kartları oluştur
const icracilarGrid = document.getElementById('icracilar-grid');
icracilar.forEach((s, i) => icracilarGrid.appendChild(kartOlustur(s, i, 'icracilar')));

const bestecilerGrid = document.getElementById('besteciler-grid');
besteciler.forEach((s, i) => bestecilerGrid.appendChild(kartOlustur(s, i, 'besteciler')));
