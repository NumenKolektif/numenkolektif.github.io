  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cormorant Garamond', Georgia, serif; background: #F5F3EE; color: #1a1a1a; position: relative; }

    .site-header {
      position: absolute; top: 0; left: 0; right: 0;
      background: transparent; padding: 14px 40px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; z-index: 10;
    }
    .logo-group { display: flex; align-items: center; gap: 16px; flex-shrink: 0; text-decoration: none; }
    .site-logo { width: 120px; height: 120px; object-fit: contain; background: transparent; border-radius: 0; padding: 0; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4)); }
    .site-name { color: white; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 28px; font-weight: 600; letter-spacing: 0.06em; text-shadow: 0 1px 6px rgba(0,0,0,0.6); }
    .header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .lang-switcher { display: flex; gap: 6px; }
    .lang-btn {
      background: transparent; border: 1px solid rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.6); font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 13px; letter-spacing: 0.12em; padding: 4px 10px;
      border-radius: 3px; cursor: pointer; transition: all 0.2s;
    }
    .lang-btn:hover, .lang-btn.active { border-color: white; color: white; background: rgba(255,255,255,0.1); }
    .nav-tabs { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .tab {
      padding: 10px 20px; color: #1E2D7A; font-size: 15px; font-weight: 600;
      font-family: 'Cormorant Garamond', Georgia, serif; cursor: pointer;
      border: none; background: #C8D8FF; border-radius: 6px; letter-spacing: 0.04em;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35); white-space: nowrap;
      transition: background 0.15s; text-decoration: none; display: inline-block;
    }
    .tab:hover { background: #DDEAFF; }
    .tab.active { background: #DDEAFF; border-bottom: 3px solid #E07B00; border-radius: 6px 6px 3px 3px; }

    .hero-band { width: 100%; height: 420px; background: #1E2D7A url('background.jpeg') center 15% / cover no-repeat; }

    .content-area { max-width: 960px; margin: 0 auto; padding: 48px 40px; }

    .page-title {
      font-size: 13px; color: #1E2D7A; text-transform: uppercase;
      letter-spacing: 0.14em; font-weight: 700;
      border-left: 3px solid #C0392B; padding-left: 12px; margin-bottom: 32px;
    }

    .alt-tabs { display: flex; gap: 12px; margin-bottom: 40px; flex-wrap: wrap; }

      padding: 12px 28px; font-family: 'Cormorant Garamond', Georgia, serif;

      cursor: pointer; border: 2px solid #1E2D7A; border-radius: 6px;
      background: transparent; color: #1E2D7A; transition: all 0.2s;
    }
    .alt-btn:hover, .alt-btn.active { background: #1E2D7A; color: white; }

    .panel { display: none; }
    .panel.active { display: block; }

    .sanatci-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 32px; }

    .sanatci-kart {
      background: white; border-radius: 8px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); cursor: pointer; transition: box-shadow 0.2s;
    }
    .sanatci-kart:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.15); }

    .kart-foto { width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: top; display: block; }
    .kart-foto-placeholder { width: 100%; aspect-ratio: 3/4; background: #e8e4dc; display: flex; align-items: center; justify-content: center; color: #999; font-size: 13px; }

    .kart-bilgi { padding: 16px 20px; }
    .kart-ad { font-size: 20px; font-weight: 600; color: #1E2D7A; margin-bottom: 4px; }
    .kart-enstruman { font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: #C0392B; }

    .nk-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 1000;
      align-items: flex-start; justify-content: center;
      padding: 40px 20px; overflow-y: auto;
    }
    .nk-modal-overlay.open { display: flex; }
    .nk-modal { background: #F5F3EE; border-radius: 10px; max-width: 760px; width: 100%; overflow: hidden; position: relative; }
    .nk-modal-kapat {
      position: absolute; top: 16px; right: 16px; background: #1E2D7A;
      color: white; border: none; width: 32px; height: 32px;
      border-radius: 50%; font-size: 18px; cursor: pointer; line-height: 32px; text-align: center; z-index: 10;
    }
    .nk-modal-ust { display: flex; }
    .nk-modal-foto { width: 240px; flex-shrink: 0; object-fit: cover; object-position: top; }
    .nk-modal-foto-placeholder { width: 240px; flex-shrink: 0; background: #e8e4dc; display: flex; align-items: center; justify-content: center; color: #999; font-size: 13px; min-height: 300px; }
    .nk-modal-baslik { padding: 28px 32px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .nk-modal-ad { font-size: 28px; font-weight: 700; color: #1E2D7A; margin-bottom: 6px; }
    .nk-modal-enstruman { font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: #C0392B; }
    .nk-modal-biyografi { padding: 24px 32px; border-top: 1px solid #e0dbd2; }
    .nk-modal-biyografi p { font-size: 16px; line-height: 1.85; color: #2a2a2a; margin-bottom: 12px; }
    .nk-modal-biyografi p:last-child { margin-bottom: 0; }

    .site-footer { background: #1E2D7A; padding: 24px 40px; margin-top: 48px; }
    .footer-contacts { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
    .contact-row { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.8); font-size: 15px; text-decoration: none; }
    .contact-row:hover { color: white; }
    .contact-icon { width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .icon-gmail { background: white; }
    .icon-instagram { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .icon-spotify { background: #1DB954; }

    @media (max-width: 640px) {
      .site-header { padding: 14px 20px; flex-direction: column; align-items: flex-start; }
      .site-logo { width: 100px; height: 100px; }
      .site-name { font-size: 22px; }
      .nav-tabs { width: 100%; }
      .tab { padding: 8px 14px; font-size: 13px; }
      .hero-band { height: 200px; }
      .content-area { padding: 32px 20px; }
      .sanatci-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
      .nk-modal-ust { flex-direction: column; }
      .nk-modal-foto, .nk-modal-foto-placeholder { width: 100%; min-height: 280px; }
      .site-footer { padding: 20px; }
    }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let currentLang = 'tr';

const icracilar = [
  { ad: "İdil Yunkuş", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/idil_yunkus.jpg",
    bio_tr: "İdil Yunkuş keman eğitimine beş yaşında babası Selahattin Yunkuş ile başlamış, Mersin Üniversitesi Devlet Konservatuvarı'nda Lily Tchumburidze ile devam etmiş ve 2017 yılında Profesör Çiğdem İyicil'in sınıfında lise eğitimini Mimar Sinan Güzel Sanatlar Üniversitesi İstanbul Devlet Konservatuvarı'nda tamamlamıştır. Amsterdam Konservatuarı hazırlık sınıfında Ilya Grubert ile çalışmış, ardından Lahey Kraliyet Konservatuvarı'nda Theodora Geraets ve Janet Krause ile eğitimini sürdürmüş ve 2023 yılında üstün dereceyle mezun olmuştur.<br><br>İstanbul Devlet Senfoni Orkestrası, Eskişehir Büyükşehir Belediyesi Senfoni Orkestrası, Bursa Bölge Devlet Senfoni Orkestrası ve Hacettepe Üniversitesi Devlet Konservatuvarı Senfoni Orkestrası eşliğinde Stravinsky, Mendelssohn, Vieuxtemps ve Erkin'in keman konçertolarını solist olarak seslendirmiştir.<br><br>Eylül 2023'te Keep an Eye Vakfı tarafından 'Yılın Genç Müzisyeni' ödülüne, Eylül 2024'te ise Het Kerstjes Kurumu tarafından 'Hollanda Keman Bursu' ödülüne layık görülmüştür. Dr. Nejat Eczacıbaşı Müzik Bursiyeri olarak Hollanda'da sürdürdüğü yüksek lisansını 2025 Haziran'ında cum laude derecesiyle tamamlamıştır. Mart 2024 itibarıyla Hollanda Müzik Enstrümanları Fonu (NMF) tarafından kendisine verilen 1800 yapımı Johannes Cuypers keman ile çalmaktadır.",
    bio_en: "İdil Yunkuş began her violin studies at the age of five with her father Selahattin Yunkuş, continued at Mersin University State Conservatory with Lily Tchumburidze, and completed her secondary education in 2017 in the class of Professor Çiğdem İyicil at Mimar Sinan Fine Arts University Istanbul State Conservatory. She studied in the preparatory programme at the Amsterdam Conservatory with Ilya Grubert, then continued her training at the Royal Conservatoire of The Hague with Theodora Geraets and Janet Krause, graduating with distinction in 2023.<br><br>She has performed as soloist with the Istanbul State Symphony Orchestra, Eskişehir Metropolitan Municipality Symphony Orchestra, Bursa Regional State Symphony Orchestra and Hacettepe University State Conservatory Symphony Orchestra, performing concertos by Stravinsky, Mendelssohn, Vieuxtemps and Erkin.<br><br>In September 2023 she was awarded the Keep an Eye Foundation's 'Young Musician of the Year' prize, and in September 2024 the 'Netherlands Violin Scholarship' by Het Kerstjes Foundation. A Dr. Nejat Eczacıbaşı Music Scholarship holder, she completed her master's degree in the Netherlands cum laude in June 2025. Since March 2024 she plays on a 1800 Johannes Cuypers violin kindly loaned by the Netherlands Musical Instruments Foundation (NMF)." },
  { ad: "Sofiko Tchumburidze", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/sofiko_tchumburidze.jpg",
    bio_tr: "2000 yılında Mersin'de Gürcü müzisyen bir ailenin çocuğu olarak dünyaya gelen Sofiko Tchumburidze, keman eğitimine annesi Lily Tchumburidze ile başlamıştır. Hochschule für Musik und Theater München'deki lisans eğitimini Prof. Julia Fischer'ın öğrencisi olarak tamamlayan sanatçı, yüksek lisans eğitimini de aynı hocayla sürdürmektedir.<br><br>Solist olarak Türkiye Cumhuriyeti Cumhurbaşkanlığı Senfoni Orkestrası, Çukurova Devlet Senfoni Orkestrası, Bursa Devlet Senfoni Orkestrası ve Antalya Senfoni Orkestrası ile sahne almıştır. Alpha Classics için Howard Griffiths yönetiminde Mozarteum Orkestrası ile CD kaydı gerçekleştirmiştir. 2022 yılından itibaren Daniel Barenboim yönetimindeki Divan Orkestrası ile Avrupa'nın önde gelen salonlarında konserler vermiştir.<br><br>ÇEV Sanat bursiyeri olan Tchumburidze, Deutsche Stiftung Musikleben tarafından kendisine verilen 1890 yapımı Lorenzo Ventapane kemanı ile kariyerine devam etmektedir.",
    bio_en: "Born in 2000 in Mersin into a Georgian musical family, Sofiko Tchumburidze began her violin studies with her mother Lily Tchumburidze. She completed her undergraduate studies at the Hochschule für Musik und Theater München as a student of Prof. Julia Fischer, with whom she continues her master's studies.<br><br>As a soloist she has performed with the Presidential Symphony Orchestra of the Republic of Turkey, Çukurova State Symphony Orchestra, Bursa State Symphony Orchestra and Antalya Symphony Orchestra. She has recorded a CD for Alpha Classics with the Mozarteum Orchestra under Howard Griffiths. Since 2022 she has given concerts across Europe's leading halls with the Divan Orchestra under Daniel Barenboim.<br><br>A ÇEV Sanat scholarship holder, Tchumburidze plays on an 1890 Lorenzo Ventapane violin kindly provided by Deutsche Stiftung Musikleben." },
  { ad: "Ilgın Top", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/ilgin_top.jpg",
    bio_tr: "Uluslararası alanda ödüller kazanmış kemancı Ilgın Top, hem solist hem de oda müzisyeni olarak dikkat çeken bir kariyere sahiptir. Lisans eğitimini Maastricht Konservatuvarı'nda Boris Belkin'in sınıfında üstün başarıyla tamamlamıştır.<br><br>Bilkent Senfoni Orkestrası, İzmir ve İstanbul Devlet Senfoni Orkestraları, Bursa ve Eskişehir Senfoni Orkestraları ve Galiçya Kraliyet Filarmoni Orkestrası gibi topluluklarla konserler vermiştir. Suna Kan Keman Yarışması ve Arthur Grumiaux Keman Yarışması gibi saygın uluslararası yarışmalarda birincilik elde etmiştir. 2023 yılında Aydın Gün Teşvik Ödülü'nü kazanmıştır.<br><br>Halen Hannover Müzik ve Tiyatro Yüksekokulu'nda Krzysztof Wegrzyn ile Konzertexamen programına devam etmektedir. Deutsche Stiftung Musikleben tarafından kendisine tahsis edilen Stephan von Baehr yapımı özel bir kemanla çalmaktadır.",
    bio_en: "An internationally award-winning violinist, Ilgın Top has built a career distinguished both as a soloist and chamber musician. She completed her undergraduate studies with distinction at the Maastricht Conservatory in the class of Boris Belkin.<br><br>She has given concerts with the Bilkent Symphony Orchestra, Izmir and Istanbul State Symphony Orchestras, Bursa and Eskişehir Symphony Orchestras, and the Royal Galician Philharmonic Orchestra. She has won first prizes at prestigious international competitions including the Suna Kan Violin Competition and the Arthur Grumiaux Violin Competition. In 2023 she received the Aydın Gün Encouragement Award.<br><br>She is currently pursuing the Konzertexamen programme at the Hochschule für Musik, Theater und Medien Hannover with Krzysztof Wegrzyn, and plays on a special violin by Stephan von Baehr kindly made available by Deutsche Stiftung Musikleben." },
  { ad: "Doğa Altınok", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/doga_altinok.jpg",
    bio_tr: "2000 doğumlu Doğa Altınok, keman eğitimine 2007'de Çukurova Üniversitesi Devlet Konservatuvarı'nda başlamıştır. Arthur Grumiaux Keman Yarışması (Brüksel, 2020 — 1.lik), Andrea Postacchini Yarışması (İtalya, 2015 — 1.lik) ve Young Virtuosos Yarışması (Sofya, 2015 — 1.lik) dahil pek çok prestijli yarışmada ödüller kazanmıştır.<br><br>Viyana Müzik ve Sahne Sanatları Üniversitesi'nde Prof. Dora Schwarzberg ve Prof. Anton Sorokow ile eğitimini sürdürmüştür. İzmir, Antalya, Bursa, Cumhurbaşkanlığı, İstanbul Devlet Senfoni Orkestraları ile konserler vermiş; Avrupa'nın önde gelen şehirlerinde resital ve oda müziği konserleri gerçekleştirmiştir.<br><br>Güher & Süher Pekinel 'Dünya Sahnelerinde Genç Müzisyenler' Projesi dahilinde TÜPRAŞ tarafından desteklenmiştir. Ocak 2023'ten itibaren Viyana'daki Tonkünstler Orkestrası'nda ikinci kemanların yardımcı grup şefi pozisyonunda görev yapmaktadır.",
    bio_en: "Born in 2000, Doğa Altınok began violin studies in 2007 at Çukurova University State Conservatory. Among her international prizes are first place at the Arthur Grumiaux Violin Competition (Brussels, 2020), the Andrea Postacchini Competition (Italy, 2015) and the Young Virtuosos Competition (Sofia, 2015).<br><br>She continued her studies at the University of Music and Performing Arts Vienna with Prof. Dora Schwarzberg and Prof. Anton Sorokow, and has performed with the Izmir, Antalya, Bursa, Presidential and Istanbul State Symphony Orchestras, as well as recitals and chamber music concerts across major European cities.<br><br>Supported by the Güher & Süher Pekinel 'Young Musicians on World Stages' Project through TÜPRAŞ, she has held the position of associate concertmaster of the second violins in the Tonkünstler Orchestra in Vienna since January 2023." },
  { ad: "Yağmur Tuna", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/yagmur_tuna.jpg",
    bio_tr: "Yağmur Tuna 2005 yılında Eskişehir'de doğdu. 2015 yılında Anadolu Üniversitesi Devlet Konservatuvarı'nda konservatuvar eğitimine başladı. 2020 yılında Moskova Çaykovski Konservatuvarı Merkez Müzik Okulu'nu kazandı.<br><br>Paris Nouvelles Etoiles Yarışması'nda (2023 — 1.lik), Uluslararası Stravinsky Yarışması'nda (St. Petersburg, 2024 — 1.lik) ve Uluslararası YSAYE Yarışması'nda (Brüksel, 2022 — 3.lük) ödüller kazanmıştır. 2025'te Bolşoy Tiyatrosu'nda konser vermiş, Eskişehir ve İstanbul Devlet Senfoni Orkestraları ile solist olarak sahne almıştır.<br><br>Moskova Çaykovski Konservatuvarı'nı yabancı öğrenciler arasında en yüksek puanla kazanmış olup Prof. Alexander Vinnitski'nin sınıfında eğitimini sürdürmektedir. Enka Vakfı Lale Tara Sanat Bursu bursiyeridir.",
    bio_en: "Yağmur Tuna was born in 2005 in Eskişehir and began her conservatory education at Anadolu University State Conservatory in 2015. In 2020 she was admitted to the Central Music School of the Moscow Tchaikovsky Conservatory.<br><br>Among her prizes are first place at the Paris Nouvelles Etoiles Competition (2023), first place at the International Stravinsky Competition (St. Petersburg, 2024) and third place at the International YSAYE Competition (Brussels, 2022). In 2025 she performed at the Bolshoi Theatre and appeared as soloist with the Eskişehir and Istanbul State Symphony Orchestras.<br><br>She was admitted to the Moscow Tchaikovsky Conservatory with the highest score among international students and continues her studies in the class of Prof. Alexander Vinnitski. She holds the Enka Foundation Lale Tara Arts Scholarship." },
  { ad: "İdil Olgar", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/idil_olgar.jpg",
    bio_tr: "2006 yılında Mersin'de doğan İdil Olgar, keman eğitimine 2012 yılında Mersin Üniversitesi Devlet Konservatuvarı'nda başladı. 2018'de Prag'da ikincilik, 2018'de Budapeşte'de birincilik elde etmiştir.<br><br>2024 yılında İzmir Senfoni Orkestrası ile Sibelius Keman Konçertosu'nu solist olarak seslendirmiştir. 2025 yılında oda müziği grubuyla Lamont School of Music yarışmasını kazanarak Colorado Müzik Festivali'ne davet edilmiş ve CPR radyo istasyonu ile kayıt yapmıştır. 2026 yılından itibaren Jean Baptiste Vuillaume yapımı keman ile çalmaktadır.",
    bio_en: "Born in 2006 in Mersin, İdil Olgar began violin studies in 2012 at Mersin University State Conservatory. She won second place in Prague (2018) and first place in Budapest (2018).<br><br>In 2024 she performed the Sibelius Violin Concerto as soloist with the Izmir Symphony Orchestra. In 2025 her chamber music ensemble won the Lamont School of Music competition, leading to an invitation to the Colorado Music Festival and a recording with CPR radio station. Since 2026 she plays on a violin by Jean Baptiste Vuillaume." },
  { ad: "İlke Işı Tuncer", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/ilke_isi_tuncer.jpg",
    bio_tr: "2005 yılında Ankara'da doğan İlke Işı Tuncer, 2011 yılında Bilkent Üniversitesi Müzik ve Sahne Sanatları Fakültesi'nde keman eğitimine başladı. 2022 yılından bu yana Belçika'daki Musica Mundi School'da eğitimini sürdürmektedir.<br><br>Berlin Konzerthaus, Prag Rudolfinum, Bozar Brussels ve Roma Santa Cecilia gibi prestijli salonlarda sahne almıştır. Sırbistan Uluslararası Müzik Yarışması'nda 1.lik, Ulusal Genç Yetenekler Yarışması'nda Grand Prix, 2025'te 3. Arnold Rose Uluslararası Keman Yarışması'nda 'Wiener Klassik' özel ödülüne layık görülmüştür.<br><br>Türkiye Gençlik Filarmoni Orkestrası'nda başkemancı olarak seçilmiş, 48. İstanbul Müzik Festivali kapsamında Süreyya Operası'nda sahne almıştır. 2025 yılında Royal College of Music London'da tam burslu eğitim hakkı kazanmıştır.",
    bio_en: "Born in 2005 in Ankara, İlke Işı Tuncer began violin studies at Bilkent University Faculty of Music and Performing Arts in 2011. Since 2022 she has been studying at Musica Mundi School in Belgium.<br><br>She has performed in prestigious venues including Berlin Konzerthaus, Prague Rudolfinum, Bozar Brussels and Rome's Santa Cecilia. Her prizes include first place at the Serbia International Music Competition, the Grand Prix at the National Young Talents Competition, and in 2025 the special 'Wiener Klassik' award at the 3rd Arnold Rose International Violin Competition.<br><br>Selected as concertmaster of the Turkey Youth Philharmonic Orchestra, she performed at Süreyya Opera House as part of the 48th Istanbul Music Festival. In 2025 she was awarded a full scholarship to the Royal College of Music London." },
  { ad: "Ada Enön", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/ada_enon.jpg",
    bio_tr: "31 Ekim 2001 tarihinde İstanbul'da doğan Ada Enön, keman çalışmalarına 2007 yılında Lili Tchumburidze'nin öğrencisi olarak başladı. 2013'te 3. Uluslararası Harmony Keman Yarışması'nda birincilik, 2014'te Grumiaux Uluslararası Keman Yarışması'nda mansiyon ödülü aldı.<br><br>2020 yılında Sorbonne Üniversitesi Müzikoloji Bölümü ve Paris Bölge Konservatuvarı'na kabul edildi. Paris'teki öğrenimi boyunca Orchestre de Paris bünyesinde Philharmonie de Paris'de staj programına katıldı. 2024–2025 yılları arasında Viyana'daki Schubert Konservatuvarı'nda Prof. Louise Chisson ile çalışmalarını sürdürdü. Günümüzde İzmir Oda Orkestrası üyesidir.",
    bio_en: "Born on 31 October 2001 in Istanbul, Ada Enön began violin studies in 2007 as a student of Lily Tchumburidze. She won first place at the 3rd International Harmony Violin Competition in 2013 and a distinction at the Grumiaux International Violin Competition in 2014.<br><br>In 2020 she was accepted to the Musicology Department of Sorbonne University and the Paris Regional Conservatory. During her studies in Paris she participated in a traineeship at the Philharmonie de Paris with the Orchestre de Paris. Between 2024 and 2025 she studied with Prof. Louise Chisson at the Schubert Conservatory in Vienna. She is currently a member of the Izmir Chamber Orchestra." },
  { ad: "Rüzgar Turgay", enstruman_tr: "Keman", enstruman_en: "Violin", foto: "photos/ruzgar_turgay.jpg",
    bio_tr: "Rüzgar Turgay 1996 yılında İstanbul'da doğdu. Keman eğitimine 4,5 yaşında başladı; 2004 yılında İstanbul Üniversitesi Devlet Konservatuvarı'nda Venyamin Varshavsky'nin sınıfına girdi. 2021 yılında Yüksek Lisans eğitimini tamamlamış olup halen aynı kurumda doktora eğitimine devam etmektedir.<br><br>Sillage Ensemble yaylı orkestrasının kurucu üyesidir. Büyükada Quartet ile AKOB 5. Ulusal Oda Müziği Yarışması'nda birincilik ödülü kazanmıştır. 2021 yılından itibaren Maltepe Üniversitesi Konservatuarı'nda araştırma görevlisi olarak çalışmaktadır.",
    bio_en: "Rüzgar Turgay was born in 1996 in Istanbul and began violin studies at the age of four and a half. In 2004 he entered the class of Venyamin Varshavsky at Istanbul University State Conservatory, where he completed his master's degree in 2021 and is currently pursuing his doctorate.<br><br>He is a founding member of the Sillage Ensemble string orchestra. Together with Büyükada Quartet he won first prize at the AKOB 5th National Chamber Music Competition. Since 2021 he has served as a research assistant at Maltepe University Conservatory." },
  { ad: "Emir Kemancı", enstruman_tr: "Viyola", enstruman_en: "Viola", foto: "photos/emir_kemanci.jpg",
    bio_tr: "İstanbul doğumlu Emir Kemancı, viyola eğitimine 2011 yılında MSGSÜ Devlet Konservatuarı'nda başladı. Prof. Tabea Zimmermann, Prof. Tatjana Masurenko ve Prof. Andra Darzins ile masterclass çalışmalarına katılmıştır.<br><br>Türkiye Ulusal Gençlik Filarmoni Orkestrası ile Berlin Konzerthaus, Prag Rudolfinum Dvořák Hall ve Venedik'te konserler vermiştir. Aynı orkestranın viyola grup şefliğini üstlenerek Viyana'da Radio Kulturhaus'ta konser vermiş; bu konser Avusturya Radyosu yayınından dinleyicilere ulaşmıştır. 2018–2019 İş Sanat konser sezonu açılış konserinde Cumhurbaşkanlığı Senfoni Orkestrası ile solist olarak yer almıştır.<br><br>2024 yılında İstanbul Devlet Senfoni Orkestrası'nda göreve başlamıştır.",
    bio_en: "Born in Istanbul, Emir Kemancı began viola studies in 2011 at MSGSÜ State Conservatory. He has participated in masterclasses with Prof. Tabea Zimmermann, Prof. Tatjana Masurenko and Prof. Andra Darzins.<br><br>With the Turkey National Youth Philharmonic Orchestra he has performed at Berlin Konzerthaus, Prague Rudolfinum Dvořák Hall and Venice. Serving as principal violist of the same orchestra, he gave a concert at Radio Kulturhaus in Vienna broadcast on Austrian Radio. He appeared as soloist with the Presidential Symphony Orchestra at the opening concert of the 2018–2019 İş Sanat season.<br><br>He joined the Istanbul State Symphony Orchestra in 2024." },
	
  { ad: "Arcan İşenkul", enstruman_tr: "Viyola", enstruman_en: "Viola", foto: "photos/arcan_isenkul.jpg",
    bio_tr: "'Renkli müzikal ifadesi, mükemmel tonu ve sanatsal vizyonu' ile övgü toplayan Arcan İşenkul (2005, Ankara), 2025 yılında prestijli Siemens Sanat Programı'na seçilerek Carnegie Hall Weill Music Room sahnesinde konser vermiştir.<br><br>Halen Frankfurt Müzik ve Sahne Sanatları Üniversitesi'nde ünlü viyola virtüözü Prof. Tabea Zimmermann ile eğitimini sürdürmektedir. 6. Uluslararası Oskar Nedbal Viyola Yarışması'nda 'Pirastro Üstün Genç Yetenek Ödülü' ve Uluslararası Prof. Ruşen Güneş Viyola Yarışması'nda birincilik kazanmıştır. Concertgebouworkest, Bilkent Senfoni ve Luzerne Music Center Orkestrası ile konserler vermiştir.<br><br>Alman Enstrüman Fonu (Deutsche Stiftung Musikleben) bursiyeri olarak 1973 yapımı Josef Kantuscher Op. 310 viyola ile çalmaktadır.",
    bio_en: "Praised for his 'colourful musical expression, exquisite tone and artistic vision,' Arcan İşenkul (born 2005, Ankara) was selected for the prestigious Siemens Arts Programme in 2025 and performed at Carnegie Hall's Weill Music Room.<br><br>He is currently studying at the Frankfurt University of Music and Performing Arts with the renowned viola virtuoso Prof. Tabea Zimmermann. He has won the 'Pirastro Outstanding Young Talent Award' at the 6th International Oskar Nedbal Viola Competition and first prize at the International Prof. Ruşen Güneş Viola Competition, and has performed with the Concertgebouworkest, Bilkent Symphony and Lucerne Music Center Orchestra.<br><br>A Deutsche Stiftung Musikleben scholarship holder, he plays on a 1973 Josef Kantuscher Op. 310 viola." },
  
  { ad: "Arda Aykut", enstruman_tr: "Viyola", enstruman_en: "Viola", foto: "photos/arda_aykut.jpg",
    bio_tr: "Arda Aykut 2002 yılında Ankara'da doğdu. 2021 yılından itibaren UdK Berlin'de Prof. Julia Rebekka-Brembeck Adler ile solo lisans ve ardından master eğitimine devam etmektedir. Artemis Quartet'ten Vineta Sareika ve Gregor Sigl ile oda müziği eğitimi almıştır.<br><br>Berlin Philharmonie, Konzerthaus, München Herkulessaal ve Salzburg'da konserler vermiş; Sir Simon Rattle ile çalışma fırsatı bulmuştur. Üyesi olduğu Varyon Quartet ile Japonya'da Munetsugu Hall String Quartet Competition'da ve Almanya'da 1.lik ödülleri kazanmıştır.<br><br>Lisans eğitimini UdK Berlin'de en üst dereceyle tamamlamış olup eğitimi Dr. Herbert und Anne-Marie Lembcke Ad-Infinitum-Foundation ve Kurt und Felicitas Vössing Stiftung vakıfları tarafından desteklenmektedir.",
    bio_en: "Arda Aykut was born in 2002 in Ankara and has been studying at UdK Berlin with Prof. Julia Rebekka-Brembeck Adler since 2021, first in undergraduate and then master's studies. He has received chamber music coaching from Artemis Quartet members Vineta Sareika and Gregor Sigl.<br><br>He has performed at the Berlin Philharmonie, Konzerthaus, Munich Herkulessaal and in Salzburg, and has had the opportunity to work with Sir Simon Rattle. With his ensemble Varyon Quartet he has won first prizes in Japan at Munetsugu Hall String Quartet Competition and in Germany.<br><br>He completed his undergraduate degree at UdK Berlin with the highest distinction, and his studies are supported by the Dr. Herbert und Anne-Marie Lembcke Ad-Infinitum-Foundation and the Kurt und Felicitas Vössing Stiftung." },
  { ad: "Beste Yıldız", enstruman_tr: "Viyolonsel", enstruman_en: "Cello", foto: "photos/beste_yildiz.jpg",
    bio_tr: "Beste Yıldız 2001 yılında Adana'da doğdu. 2019 yılında Den Haag Kraliyet Konservatuvarı'nda Larissa Groeneveld'in sınıfına kabul edildi. Yüksek Lisansını ayrıcalık ödülü ile tamamladı; Dr. Nejat Eczacıbaşı Vakfı müzik bursiyeri ve Den Haag Kraliyet Konservatuvarı 'Excellence Scholarship' bursiyeri olmuştur.<br><br>Ankara Müzik Festivali, Delft Chamber Music Festival ve Cellowercken Zutphen kapsamında sahne almıştır. Hollanda Ulusal Gençlik Orkestrası'nın başçellisti olarak konserler vermiştir.<br><br>Rotterdam Filarmoni Orkestrası'nın orkestra akademisi programına seçilmiş olup 2026–2027 sezonunda akademisyen sanatçı olarak konserler verecektir. The Netherlands Musical Instrument Foundation tarafından kendisine verilen 1870 Gaetano Chiocchi yapımı İtalyan çellosunu çalmaktadır.",
    bio_en: "Beste Yıldız was born in 2001 in Adana. In 2019 she was admitted to the class of Larissa Groeneveld at the Royal Conservatoire of The Hague, where she completed her master's degree with distinction. She holds scholarships from the Dr. Nejat Eczacıbaşı Foundation and the Royal Conservatoire of The Hague Excellence Scholarship.<br><br>She has performed at the Ankara Music Festival, the Delft Chamber Music Festival and Cellowercken Zutphen, and served as principal cellist of the Netherlands National Youth Orchestra.<br><br>Selected for the Rotterdam Philharmonic Orchestra's academy programme, she will perform as an academy artist during the 2026–2027 season. She plays on an 1870 Italian cello by Gaetano Chiocchi, kindly loaned by The Netherlands Musical Instrument Foundation." },
  { ad: "Berkay Azıtepe", enstruman_tr: "Viyolonsel", enstruman_en: "Cello", foto: "photos/berkay_azitepe.jpg",
    bio_tr: "2003 yılında Ankara'da doğan Berkay Azıtepe, 2025 yılında Hacettepe Üniversitesi Ankara Devlet Konservatuvarı'ndan yüksek dereceyle mezun oldu. 2024 yılından bu yana İstanbul Devlet Senfoni Orkestrası'nda viyolonsel sanatçısı olarak görev yapmaktadır.<br><br>Türkiye Gençlik Filarmoni Orkestrası ile Prag Rudolfinum ve Berlin Konzerthaus'ta konser vermiştir. Pan-Caucasian Youth Orchestra ile Tsinandali Festivali'ne, Musica Mundi Festivali'ne yüksek bursla katılmıştır. Thomas Kuti Viyolonsel Yarışması Türkiye etabında birincilik elde ederek Dublin'de Türkiye'yi temsil etmiştir.<br><br>Sascha Goetzel, Howard Griffiths ve Andreas Ottensamer gibi şeflerle çalışmış; İstanbul Filarmoni Derneği Quartet'in çellisti olmuştur.",
    bio_en: "Born in 2003 in Ankara, Berkay Azıtepe graduated with distinction from Hacettepe University Ankara State Conservatory in 2025. Since 2024 he has been serving as a cellist with the Istanbul State Symphony Orchestra.<br><br>With the Turkey Youth Philharmonic Orchestra he has performed at Prague Rudolfinum and Berlin Konzerthaus. He has participated with full scholarships in the Tsinandali Festival with the Pan-Caucasian Youth Orchestra and in the Musica Mundi Festival. He won first prize at the Turkish round of the Thomas Kuti Cello Competition and represented Turkey in Dublin.<br><br>He has worked with conductors such as Sascha Goetzel, Howard Griffiths and Andreas Ottensamer, and was the cellist of the Istanbul Philharmonic Society Quartet." },


  { ad: "Ülker Tümer",  enstruman_tr: "Viyolonsel",  enstruman_en: "Cello",  foto: "photos/ulker_tumer.jpg",

  bio_tr: "1998 yılında Adana'da doğan Ülker Tümer, 2009 yılında Viacheslav Kaynov ile Çukurova Üniversitesi Devlet Konservatuvarı'nda çello çalışmalarına başladı. 2013-2016 yılları arasında ise Mimar Sinan Güzel Sanatlar Üniversitesi İstanbul Devlet Konservatuvarı'nda Dilbağ Tokay ile çalışmalarını sürdürdü.<br><br>Kronberg Academy, AIMA, Amsterdam Cello Biennale, Rutesheim Cello Academy ve Cervo Summer Academy gibi çeşitli ustalık sınıflarına aktif olarak katıldı ve Anner Bylsma, Julian Steckel, Maria Kliegel, Peter Bruns, Umberto Clerici, Christoph Henkel, Johannes Moser, Claus Kanngieser, Nicolas Altstaedt, Natalia Gutman, Claudio Bohorquez, Troels Svane, Frans Helmerson ve Gary Hoffman gibi uluslararası tanınmış müzisyenlerle çalışma fırsatı buldu.<br><br>Eğitimi süresince Türkiye ve yurt dışında birçok resital ve oda müziği konserine katıldı. 2011 yılında Rusya'da düzenlenen Büyük Bolgar Müzik Festivali'nde sahne aldı. 2013 yılında Adana String Quartet ile Iguazu En Concierto Festivali'ne katıldı. İş Sanat'ta Parlayan Yıldızlar konser serisinde resital verdi ve Pera Uluslararası Müzik Festivali'nde Genç Solistler konser serisinde sahne aldı. Doğuş Çocuk Senfoni Orkestrası, Camerata Saygun, AIMA Festival Orkestrası, Markgräfler Musikherbst Festival Orkestrası ile birlikte konserler verdi. Jean Guihen Queyras ile birlikte 2016, 2018 ve 2024 yıllarında Amsterdam Cello Bienali’nde konserler verdi.<br><br>2018 yılında, Britten Pears Genç Sanatçı Programı'nda solo viyolonselci olarak Marin Alsop şefliğinde yer aldı ve Snape Maltings Konser Salonu'nda konserler verdi. 2022 yılında ise okul orkestrasıyla Sir András Schiff yönetiminde konserler verdi. Aynı yıl Villars Müzik Akademisi'ne seçildi ve Tabea Zimmermann, Kolja Blacher, Aline Champion, Simone Bernardini, Luiz Filip Coelho, Walter Küssner ve Martin Menking ile çalışma ve birlikte çalma şansı elde etti.<br><br>Ülker Tümer, Mimar Sinan Güzel Sanatlar Üniversitesi İstanbul Devlet Konservatuvarı Orkestrası ile Haydn Çello Konçertosu (Do Majör), Çukurova Devlet Senfoni Orkestrası ile Elgar Çello Konçertosu ve Schumann Çello Konçertosu, Olten Philamonie ile Rococo Varyasyonları ve Gürer Aykal yönetiminde İstanbul Devlet Senfoni Orkestrası ile Akses’in İdil adlı eserini solist olarak seslendirdi.<br><br>Çeşitli yarışmalarda ödüller kazanan Ülker Tümer, 2015 yılında Bulgaristan'da International Music of Germany and Austria yarışmasında Birincilik Ödülü'ne ve International Music Competition Citta di Barletta yarışmasında Absolut Birincilik Ödülü'ne layık görüldü. 2017 yılında Hochschule für Musik Freiburg'da Helmut Spehl Ödülü'nü kazandı ve Benyamin Sönmez Uluslararası Çello Yarışması'nda Üçüncülük ödülüne layık görüldü. 2018 yılında Carl Seeman yarışmasında Üçüncülük ödülü aldı ve 2020 yılında Hochschule für Musik Freiburg'da Helene Rosenberg Bursu'nu kazandı.<br><br>Ülker Tümer, Jean Guihen Queyras'ın öğrencisi olarak Almanya'daki Hochschule für Musik Freiburg'da Lisans eğitimini, Escuela Superior de Musica Reina Sofia Madrid'de Ivan Monighetti ile Yüksek Lisans eğitimini ve Jens Peter Maintz ile Solistlik Diploması eğitimini tamamladı. 2024 yılından beri Tenerife Senfoni Orkestrası’nda solo viyolonselci olarak görev yapmaktadır.",

  bio_en: "Born in Adana, Turkey, in 1998, Ülker Tümer began her cello studies in 2009 with Viacheslav Kaynov at the Çukurova University State Conservatory. Between 2013 and 2016, she continued her studies with Dilbağ Tokay at the Istanbul State Conservatory of Mimar Sinan Fine Arts University.<br><br>She actively participated in masterclasses and academies such as Kronberg Academy, AIMA, Amsterdam Cello Biennale, Rutesheim Cello Academy and Cervo Summer Academy, where she had the opportunity to work with internationally renowned musicians including Anner Bylsma, Julian Steckel, Maria Kliegel, Peter Bruns, Umberto Clerici, Christoph Henkel, Johannes Moser, Claus Kanngieser, Nicolas Altstaedt, Natalia Gutman, Claudio Bohorquez, Troels Svane, Frans Helmerson and Gary Hoffman.<br><br>Throughout her education, she performed in numerous recitals and chamber music concerts both in Turkey and abroad. In 2011, she appeared at the Great Bolgar Music Festival in Russia. In 2013, she participated in the Iguazu en Concierto Festival with the Adana String Quartet. She gave a recital as part of the Rising Stars concert series at İş Sanat and performed in the Young Soloists concert series at the Pera International Music Festival. She has also performed with the Doğuş Children's Symphony Orchestra, Camerata Saygun, the AIMA Festival Orchestra and the Markgräfler Musikherbst Festival Orchestra. Together with Jean-Guihen Queyras, she performed at the Amsterdam Cello Biennale in 2016, 2018 and 2024.<br><br>In 2018, she was selected as a solo cellist for the Britten Pears Young Artist Programme under the direction of Marin Alsop and performed at Snape Maltings Concert Hall. In 2022, she performed with her conservatory orchestra under the direction of Sir András Schiff. In the same year, she was selected for the Villars Music Academy, where she had the opportunity to study and perform with Tabea Zimmermann, Kolja Blacher, Aline Champion, Simone Bernardini, Luiz Filip Coelho, Walter Küssner and Martin Menking.<br><br>As a soloist, Ülker Tümer has performed Haydn's Cello Concerto in C Major with the Orchestra of the Istanbul State Conservatory of Mimar Sinan Fine Arts University; Elgar's Cello Concerto and Schumann's Cello Concerto with the Çukurova State Symphony Orchestra; Tchaikovsky's Rococo Variations with the Olten Philharmonie; and Akses's İdil with the Istanbul State Symphony Orchestra under the baton of Gürer Aykal.<br><br>A prizewinner in numerous competitions, she received First Prize at the International Music of Germany and Austria Competition in Bulgaria and the Absolute First Prize at the International Music Competition Città di Barletta in 2015. In 2017, she was awarded the Helmut Spehl Prize at the Hochschule für Musik Freiburg and won Third Prize at the Benjamin Sönmez International Cello Competition. In 2018, she received Third Prize at the Carl Seemann Competition, and in 2020, she was awarded the Helene Rosenberg Scholarship at the Hochschule für Musik Freiburg.<br><br>Ülker Tümer completed her Bachelor's degree at the Hochschule für Musik Freiburg in Germany as a student of Jean-Guihen Queyras. She subsequently earned her Master's degree at the Escuela Superior de Música Reina Sofía in Madrid under Ivan Monighetti and completed her Soloist Diploma with Jens Peter Maintz. Since 2024, she has served as Principal Cellist of the Tenerife Symphony Orchestra."
}
```

  { ad: "Atakan Altun", enstruman_tr: "Kontrabas", enstruman_en: "Double Bass", foto: "photos/atakan_altun.jpg",
    bio_tr: "Atakan Altun (d. 2003), kontrabas eğitimine 2013 yılında Hacettepe Üniversitesi Ankara Devlet Konservatuvarı'nda başlamıştır. 2023 yılında Polonya'da düzenlenen Grzegorz Olkiewicz Uluslararası Kontrabas Yarışması'nda birincilik ve Grand Prix ödülünü kazanmıştır.<br><br>İzmir Devlet Senfoni Orkestrası, Cumhurbaşkanlığı Senfoni Orkestrası ve İstanbul Devlet Senfoni Orkestrası eşliğinde solist olarak sahne almıştır. 2022 yılında Pan Caucasian Youth Orchestra bünyesinde Vasily Petrenko ve Charles Dutoit gibi uluslararası şeflerle çalışmıştır.<br><br>Hacettepe Üniversitesi Ankara Devlet Konservatuvarı'ndan birincilikle mezun olan Altun, 2024 yılından itibaren Antalya Devlet Senfoni Orkestrası'nda görev yapmaktadır.",
    bio_en: "Atakan Altun (born 2003) began double bass studies in 2013 at Hacettepe University Ankara State Conservatory. In 2023 he won first prize and the Grand Prix at the Grzegorz Olkiewicz International Double Bass Competition in Poland.<br><br>He has performed as soloist with the Izmir State Symphony Orchestra, Presidential Symphony Orchestra and Istanbul State Symphony Orchestra. In 2022, as part of the Pan Caucasian Youth Orchestra, he worked with international conductors including Vasily Petrenko and Charles Dutoit.<br><br>A first-place graduate of Hacettepe University Ankara State Conservatory, he has been a member of the Antalya State Symphony Orchestra since 2024." },
  { ad: "Büşra Başoğlu", enstruman_tr: "Kontrabas", enstruman_en: "Double Bass", foto: "photos/busra_basoglu.jpg",
    bio_tr: "2006 yılında doğan Büşra Başoğlu, 2016 yılında Hacettepe Üniversitesi Ankara Devlet Konservatuvarı'nda Prof. Dr. Burak Karaağaç ile kontrabas eğitimine başladı. Türkiye Gençlik Filarmoni Orkestrası'nda 2023, 2024 ve 2025 yıllarında grup şefi olarak görev yapmıştır.<br><br>Lise son sınıfta Hacettepe Gençlik Senfoni Orkestrası eşliğinde solist olarak sahne almış; lisans birinci sınıfta İzmir Devlet Senfoni Orkestrası seçmelerini kazanarak '19 Mayıs Genç Kuşak Solistleri' kapsamında konser vermiştir. Halen Hacettepe Üniversitesi Ankara Devlet Konservatuvarı'nda lisans eğitimine devam etmektedir.",
    bio_en: "Born in 2006, Büşra Başoğlu began double bass studies in 2016 with Prof. Dr. Burak Karaağaç at Hacettepe University Ankara State Conservatory. She served as principal bassist of the Turkey Youth Philharmonic Orchestra in 2023, 2024 and 2025.<br><br>In her final year of secondary school she performed as soloist with the Hacettepe Youth Symphony Orchestra; in her first year of undergraduate study she won the Izmir State Symphony Orchestra auditions and performed as part of '19 May Young Generation Soloists.' She is currently completing her undergraduate studies at Hacettepe University Ankara State Conservatory." },
  { ad: "İrem Yunkuş", enstruman_tr: "Piyano", enstruman_en: "Piano", foto: "photos/irem_yunkus.jpg",

function kartOlustur(s) {
  const div = document.createElement('div');
  div.className = 'sanatci-kart';
  div.onclick = () => modalAc(s);
  const fotoHTML = s.foto
    ? `<img class="kart-foto" src="${s.foto}" alt="${s.ad}">`
    : `<div class="kart-foto-placeholder">—</div>`;
  div.innerHTML = `${fotoHTML}
    <div class="kart-bilgi">
      <div class="kart-ad">${s.ad}</div>
      <div class="kart-enstruman" data-key="${s.ad}_enstruman">${currentLang === 'tr' ? s.enstruman_tr : s.enstruman_en}</div>
    </div>`;
  return div;
}

function modalAc(s) {
  document.getElementById('nk-modal-ad').textContent = s.ad;
  document.getElementById('nk-modal-enstruman').textContent = currentLang === 'tr' ? s.enstruman_tr : s.enstruman_en;
  const fotoAlani = document.getElementById('nk-modal-foto-alani');
  fotoAlani.innerHTML = s.foto
    ? `<img class="nk-modal-foto" src="${s.foto}" alt="${s.ad}">`
    : `<div class="nk-modal-foto-placeholder">—</div>`;
  const bioDiv = document.getElementById('nk-modal-bio');
  const bio = currentLang === 'tr' ? s.bio_tr : s.bio_en;
  bioDiv.innerHTML = bio.split('<br><br>').map(p => `<p>${p}</p>`).join('');
  document.getElementById('nk-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('nk-modal').dataset.sanatci = s.ad;
}

function modalKapat(e) {
  if (e.target === document.getElementById('nk-modal')) {
    document.getElementById('nk-modal').classList.remove('open');
    document.body.style.overflow = '';
  }
}

function gosterPanel(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.alt-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('[data-tr]').forEach(el => {
    const val = el.getAttribute('data-' + lang);
    if (val) el.innerHTML = val;
  });
  // Kartlardaki enstrüman etiketlerini güncelle
  document.querySelectorAll('.kart-enstruman').forEach(el => {
    const key = el.dataset.key;
    const ad = key.replace('_enstruman', '');
    const s = [...icracilar, ...besteciler].find(x => x.ad === ad);
    if (s) el.textContent = lang === 'tr' ? s.enstruman_tr : s.enstruman_en;
  });
  // Açık modal varsa güncelle
  const modal = document.getElementById('nk-modal');
  if (modal.classList.contains('open')) {
    const ad = nk_modal.dataset.sanatci;
    const s = [...icracilar, ...besteciler].find(x => x.ad === ad);
    if (s) {
      document.getElementById('nk-modal-enstruman').textContent = lang === 'tr' ? s.enstruman_tr : s.enstruman_en;
      const bio = lang === 'tr' ? s.bio_tr : s.bio_en;
      document.getElementById('nk-modal-bio').innerHTML = bio.split('<br><br>').map(p => `<p>${p}</p>`).join('');
    }
  }
  document.documentElement.lang = lang;
}

// Kartları oluştur
const ig = document.getElementById('icracilar-grid');
icracilar.forEach(s => ig.appendChild(kartOlustur(s)));
const bg = document.getElementById('besteciler-grid');
besteciler.forEach(s => bg.appendChild(kartOlustur(s)));
</script>
