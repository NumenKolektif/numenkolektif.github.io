    bio_en: "Beste Yıldız was born in 2001 in Adana. She began her musical education at the age of nine with Viatcheslav Kainov at Çukurova University State Conservatory. After completing her secondary education, she was admitted to the class of Larissa Groeneveld at the Royal Conservatoire of The Hague in 2019. Having completed her undergraduate studies with distinction in 2023, she went on to graduate from Larissa Groeneveld's master's class with a distinction prize. Throughout her studies she has been a scholarship holder of the Dr. Nejat Eczacıbaşı Foundation and was awarded the Excellence Scholarship by the Royal Conservatoire of The Hague.<br><br>During her studies she has had the opportunity to work with internationally renowned artists including Maria Kliegel, Jens Peter Maintz, Giovanni Sollima, Jean-Guihen Queyras, Kyril Zlotnikov, Lucia Swarts, Joachim Eijlander, Umberto Clerici, Harro Ruijsenaars, Zlatomir Fung, Sietse-Jan Weijenberg, Çağ Erçağ, Nil Kocamangil, Dilbağ Tokay and Fazıl Say.<br><br>Having won first prize at the International Belgrade Music Competition in 2013, she performed Tchaikovsky's Rococo Variations with the Çukurova State Symphony Orchestra under Kerem Tunçer in January 2024. She has performed at leading festivals in the Netherlands and Turkey, including the Ankara Music Festival, Delft Chamber Music Festival, Festival Dag in de Branding and Cellowercken Zutphen, where she performed composer Myrto Nizami's solo cello work 'Gone in No Time' and composer Guus Jansen's 'Concertino for 4 celli and ensemble' together with Cello Biënnale Band.<br><br>In addition to her solo performances, she has performed as cello section leader in the Doğuş Children's Symphony Orchestra and the Turkey National Youth Philharmonic Orchestra across many European countries. In 2023 she gave concerts throughout the Netherlands as principal cellist of the Netherlands National Youth Orchestra alongside Wouter Vossen. She performs actively with the chamber music ensembles of which she is a member: Kali Ensemble, Numen Ensemble, ABO Trio, HarmonEast and Ensemble Orochi.<br><br>She has been selected for the Rotterdam Philharmonic Orchestra's academy programme and will perform as an academy artist during the 2026–2027 season. She continues to play the 1870 Italian cello by Gaetano Chiocchi, labelled 'Carlo Antonio Testore', kindly loaned by The Netherlands Musical Instrument Foundation." },
  { ad: "Berkay Azıtepe", enstruman_tr: "Viyolonsel", enstruman_en: "Cello", foto: "photos/berkay_azitepe.jpg",
    bio_tr: "2003 yılında Ankara'da doğan Berkay Azıtepe, viyolonsel eğitimine 2013 yılında Hacettepe Üniversitesi Ankara Devlet Konservatuvarı'nda Nuray Eşen ile başladı. 2015 yılında Nuray Eşen'in vefatının ardından çalışmalarını Şahin İzzet Nazlıaka ile sürdürdü. 2025 yılında Hacettepe Üniversitesi Ankara Devlet Konservatuvarı'ndan Doç. Dr. Kerem Aykal'ın sınıfından yüksek dereceyle mezun oldu.<br><br>Bu süreçte çok sayıda solo konser, resital, sınıf konseri, oda müziği etkinliği ve orkestra projesinde yer aldı. Peter Bruns, Gary Hoffman, Maximilian Hornung, Kian Soltani, Bruno Philippe, Aurélien Pascal, Zuzanna Sosnowska ve Joris van den Berg gibi uluslararası sanatçılarla çalışma fırsatı buldu; çeşitli ustalık sınıfı ve atölye çalışmalarına katıldı. 2022 yılında Concertgebouw Chamber Orchestra üyeleri tarafından düzenlenen ustalık sınıfında aktif olarak yer aldı; Peter Bruns ile AIMA İstanbul Kış Masterclass'ında Ayça Gökdeniz Bursu ile çalıştı. Oda müziği alanında 2025 yılında Camerata Concordia ile Richard Strauss'un Metamorphosen eserinin sekizli düzenlemesini birinci solo viyolonsel olarak seslendirdi. Aynı yıl İstanbul Filarmoni Derneği Quartet'in çellisti oldu.<br><br>Solist olarak ilk konserini Mart 2023'te Gürer Aykal yönetimindeki Eskişehir Büyükşehir Belediyesi Senfoni Orkestrası ile depremzedelere destek amacıyla düzenlenen yardım konserinde verdi. Daha sonra Hacettepe Üniversitesi Senfoni Orkestrası eşliğinde Çaykovski'nin Rokoko Varyasyonları'nı solist olarak seslendirdi. İzmir Devlet Senfoni Orkestrası Genç Solist Seçmeleri'ni kazanarak Haydn'ın Do Majör Viyolonsel Konçertosu'nu solist olarak icra etti.<br><br>2023 yılında 1. Doğan Cangal Viyolonsel Yarışması'nda üçüncülük ödülüne layık görüldü. Thomas Kuti Viyolonsel Yarışması'nın Türkiye etabında birincilik elde ederek Kasım 2025'te Dublin'de düzenlenen uluslararası finalde Türkiye'yi temsil etti.<br><br>Orkestra alanında 2022 yılında Türkiye Gençlik Filarmoni Orkestrası seçmelerini kazanarak yardımcı grup şefi olarak orkestraya katıldı ve Prag Rudolfinum Dvořák Hall ile Berlin Konzerthaus başta olmak üzere birçok önemli salonda konser verdi. 2023 yılında aynı orkestrada grup şefi olarak yeniden yer aldı ve Türkiye ile İtalya turnelerinde sahne aldı. Pan-Caucasian Youth Orchestra'ya kabul edilerek 2023 ve 2024 yıllarında Tsinandali Festivali'ne katılmaya hak kazandı. 2024 yılında Belçika'da düzenlenen 26. Musica Mundi Festivali'ne yüksek burs ile davet edildi. Cumhurbaşkanlığı Senfoni Orkestrası, Borusan Filarmoni Orkestrası, İstanbul Filarmoni Orkestrası, İstanbul Oda Orkestrası, CRR Senfoni Orkestrası, Ankara Gençlik Senfoni Orkestrası ve Bilkent Gençlik Senfoni Orkestrası gibi birçok toplulukla konserler verdi; Sascha Goetzel, Nicolo Umberto Foron, Howard Griffiths, Andreas Ottensamer, Antonio Pirolli, Carlo Tenan, Michal Nesterowicz ve Finnegan Downie Dear gibi şeflerle çalıştı.<br><br>Berkay Azıtepe, 2024 yılından bu yana İstanbul Devlet Senfoni Orkestrası'nda viyolonsel sanatçısı olarak görev yapmaktadır.",
    bio_en: "Born in 2003 in Ankara, Berkay Azıtepe began his cello studies in 2013 at Hacettepe University Ankara State Conservatory with Nuray Eşen. Following Nuray Eşen's passing in 2015, he continued his studies with Şahin İzzet Nazlıaka. In 2025 he graduated with distinction from Hacettepe University Ankara State Conservatory, from the class of Assoc. Prof. Kerem Aykal.<br><br>During this period he took part in numerous solo concerts, recitals, class concerts, chamber music events and orchestral projects. He had the opportunity to work with international artists including Peter Bruns, Gary Hoffman, Maximilian Hornung, Kian Soltani, Bruno Philippe, Aurélien Pascal, Zuzanna Sosnowska and Joris van den Berg, and participated in various masterclasses and workshops. In 2022 he actively participated in a masterclass organised by members of the Concertgebouw Chamber Orchestra and worked with Peter Bruns at the AIMA Istanbul Winter Masterclass with the Ayça Gökdeniz Scholarship. In the field of chamber music, in 2025 he performed Richard Strauss's Metamorphosen in its octet arrangement as principal solo cellist with Camerata Concordia. That same year he became the cellist of the Istanbul Philharmonic Society Quartet.<br><br>He gave his first solo concert in March 2023 with the Eskişehir Metropolitan Municipality Symphony Orchestra under Gürer Aykal, at a benefit concert organised in support of earthquake victims. He subsequently performed Tchaikovsky's Rococo Variations as soloist with the Hacettepe University Symphony Orchestra. Having won the Izmir State Symphony Orchestra Young Soloist Auditions, he performed Haydn's Cello Concerto in C Major as soloist.<br><br>In 2023 he was awarded third prize at the 1st Doğan Cangal Cello Competition. He won first prize at the Turkish round of the Thomas Kuti Cello Competition and represented Turkey at the international final held in Dublin in November 2025.<br><br>Active in the orchestral field, in 2022 he won the Turkey Youth Philharmonic Orchestra auditions and joined the orchestra as associate principal cellist, performing at major halls including Prague Rudolfinum Dvořák Hall and Berlin Konzerthaus. In 2023 he returned to the same orchestra as principal cellist and performed on tours of Turkey and Italy. He was admitted to the Pan-Caucasian Youth Orchestra and earned the right to participate in the Tsinandali Festival in both 2023 and 2024. In 2024 he was invited to the 26th Musica Mundi Festival in Belgium with a full scholarship. He has performed with many ensembles including the Presidential Symphony Orchestra, Borusan Philharmonic Orchestra, Istanbul Philharmonic Orchestra, Istanbul Chamber Orchestra, CRR Symphony Orchestra, Ankara Youth Symphony Orchestra and Bilkent Youth Symphony Orchestra, working with conductors such as Sascha Goetzel, Nicolo Umberto Foron, Howard Griffiths, Andreas Ottensamer, Antonio Pirolli, Carlo Tenan, Michal Nesterowicz and Finnegan Downie Dear.<br><br>Berkay Azıtepe has been serving as a cellist with the Istanbul State Symphony Orchestra since 2024." },
 { ad: "Ülker Tümer", enstruman_tr: "Viyolonsel", enstruman_en: "Cello", foto: "photos/ulker_tumer.jpg",
    bio_tr: "1998 yılında Adana'da doğan Ülker Tümer, 2009 yılında Viacheslav Kaynov ile Çukurova Üniversitesi Devlet Konservatuvarı'nda çello çalışmalarına başladı. 2013–2016 yılları arasında ise Mimar Sinan Güzel Sanatlar Üniversitesi İstanbul Devlet Konservatuvarı'nda Dilbağ Tokay ile çalışmalarını sürdürdü.<br><br>Kronberg Academy, AIMA, Amsterdam Cello Biennale, Rutesheim Cello Academy ve Cervo Summer Academy gibi çeşitli ustalık sınıflarına aktif olarak katıldı ve Anner Bylsma, Julian Steckel, Maria Kliegel, Peter Bruns, Umberto Clerici, Christoph Henkel, Johannes Moser, Claus Kanngieser, Nicolas Altstaedt, Natalia Gutman, Claudio Bohorquez, Troels Svane, Frans Helmerson ve Gary Hoffman gibi uluslararası tanınmış müzisyenlerle çalışma fırsatı buldu.<br><br>Eğitimi süresince Türkiye ve yurt dışında birçok resital ve oda müziği konserine katıldı. 2011 yılında Rusya'da düzenlenen Büyük Bolgar Müzik Festivali'nde sahne aldı. 2013 yılında Adana String Quartet ile Iguazu En Concierto Festivali'ne katıldı. İş Sanat'ta Parlayan Yıldızlar konser serisinde resital verdi ve Pera Uluslararası Müzik Festivali'nde Genç Solistler konser serisinde sahne aldı. Doğuş Çocuk Senfoni Orkestrası, Camerata Saygun, AIMA Festival Orkestrası ve Markgräfler Musikherbst Festival Orkestrası ile birlikte konserler verdi. Jean Guihen Queyras ile birlikte 2016, 2018 ve 2024 yıllarında Amsterdam Cello Bienali'nde konserler verdi.<br><br>2018 yılında Britten Pears Genç Sanatçı Programı'nda solo viyolonselci olarak Marin Alsop şefliğinde yer aldı ve Snape Maltings Konser Salonu'nda konserler verdi. 2022 yılında okul orkestrasıyla Sir András Schiff yönetiminde konserler verdi. Aynı yıl Villars Müzik Akademisi'ne seçildi ve Tabea Zimmermann, Kolja Blacher, Aline Champion, Simone Bernardini, Luiz Filip Coelho, Walter Küssner ve Martin Menking ile çalışma ve birlikte çalma şansı elde etti.<br><br>Solist olarak Mimar Sinan Güzel Sanatlar Üniversitesi İstanbul Devlet Konservatuvarı Orkestrası ile Haydn Çello Konçertosu (Do Majör), Çukurova Devlet Senfoni Orkestrası ile Elgar Çello Konçertosu ve Schumann Çello Konçertosu, Olten Philarmonie ile Rokoko Varyasyonları ve Gürer Aykal yönetiminde İstanbul Devlet Senfoni Orkestrası ile Akses'in İdil adlı eserini seslendirdi.<br><br>Çeşitli yarışmalarda ödüller kazanan Ülker Tümer, 2015 yılında Bulgaristan'da International Music of Germany and Austria yarışmasında Birincilik Ödülü'ne ve International Music Competition Città di Barletta yarışmasında Absolut Birincilik Ödülü'ne layık görüldü. 2017 yılında Hochschule für Musik Freiburg'da Helmut Spehl Ödülü'nü kazandı ve Benyamin Sönmez Uluslararası Çello Yarışması'nda Üçüncülük ödülüne layık görüldü. 2018 yılında Carl Seemann yarışmasında Üçüncülük ödülü aldı ve 2020 yılında Hochschule für Musik Freiburg'da Helene Rosenberg Bursu'nu kazandı.<br><br>Ülker Tümer, Jean Guihen Queyras'ın öğrencisi olarak Almanya'daki Hochschule für Musik Freiburg'da lisans eğitimini, Escuela Superior de Música Reina Sofía Madrid'de Ivan Monighetti ile yüksek lisans eğitimini ve Jens Peter Maintz ile Solistlik Diploması eğitimini tamamladı. 2024 yılından bu yana Tenerife Senfoni Orkestrası'nda solo viyolonselci olarak görev yapmaktadır.",
    bio_en: "Born in Adana in 1998, Ülker Tümer began cello studies in 2009 with Viacheslav Kaynov at Çukurova University State Conservatory. Between 2013 and 2016 she continued with Dilbağ Tokay at the Istanbul State Conservatory of Mimar Sinan Fine Arts University.<br><br>She actively participated in masterclasses at Kronberg Academy, AIMA, Amsterdam Cello Biennale, Rutesheim Cello Academy and Cervo Summer Academy, working with internationally renowned musicians including Anner Bylsma, Julian Steckel, Maria Kliegel, Peter Bruns, Umberto Clerici, Christoph Henkel, Johannes Moser, Claus Kanngieser, Nicolas Altstaedt, Natalia Gutman, Claudio Bohorquez, Troels Svane, Frans Helmerson and Gary Hoffman.<br><br>Throughout her studies she participated in numerous recitals and chamber music concerts in Turkey and abroad. In 2011 she performed at the Great Bolgar Music Festival in Russia. In 2013 she participated in the Iguazu En Concierto Festival with Adana String Quartet. She gave a recital in İş Sanat's Rising Stars concert series and performed in the Young Soloists concert series at the Pera International Music Festival. She gave concerts with the Doğuş Children's Symphony Orchestra, Camerata Saygun, AIMA Festival Orchestra and Markgräfler Musikherbst Festival Orchestra. Together with Jean-Guihen Queyras she performed at the Amsterdam Cello Biennale in 2016, 2018 and 2024.<br><br>In 2018 she participated in the Britten Pears Young Artist Programme as solo cellist under Marin Alsop and gave concerts at Snape Maltings Concert Hall. In 2022 she performed with the school orchestra under Sir András Schiff. That same year she was selected for the Villars Music Academy and had the opportunity to work and perform alongside Tabea Zimmermann, Kolja Blacher, Aline Champion, Simone Bernardini, Luiz Filip Coelho, Walter Küssner and Martin Menking.<br><br>As a soloist she has performed Haydn's Cello Concerto in C Major with the Mimar Sinan Fine Arts University Istanbul State Conservatory Orchestra, the Elgar Cello Concerto and Schumann Cello Concerto with the Çukurova State Symphony Orchestra, the Rococo Variations with the Olten Philarmonie, and Akses's İdil with the Istanbul State Symphony Orchestra under Gürer Aykal.<br><br>Among her competition prizes, in 2015 in Bulgaria she was awarded First Prize at the International Music of Germany and Austria Competition and Absolute First Prize at the International Music Competition Città di Barletta. In 2017 she won the Helmut Spehl Prize at the Hochschule für Musik Freiburg and was awarded Third Prize at the Benyamin Sönmez International Cello Competition. In 2018 she received Third Prize at the Carl Seemann Competition, and in 2020 she won the Helene Rosenberg Scholarship at the Hochschule für Musik Freiburg.<br><br>Ülker Tümer completed her undergraduate studies at the Hochschule für Musik Freiburg in Germany as a student of Jean-Guihen Queyras, her master's degree at the Escuela Superior de Música Reina Sofía in Madrid under Ivan Monighetti, and her Soloist Diploma with Jens Peter Maintz. Since 2024 she has served as Principal Cellist of the Tenerife Symphony Orchestra." },
  { ad: "Atakan Altun", enstruman_tr: "Kontrabas", enstruman_en: "Double Bass", foto: "photos/atakan_altun.jpg",
    bio_tr: "Atakan Altun (d. 2003), kontrabas eğitimine 2013 yılında Hacettepe Üniversitesi Ankara Devlet Konservatuvarı'nda Prof. Dr. Burak Karaağaç ile başlamıştır.<br><br>Uluslararası kariyerine 2016 yılında Polonya'da düzenlenen Uluslararası Kontrabas Festivali kapsamındaki yarışmada kategori birinciliği elde ederek adım atan Altun, ertesi yıl ABD'de düzenlenen ISB (International Society of Bassists) Uluslararası Kontrabas Yarışması'nda mansiyon ödülüne layık görülmüştür. 2023 yılında Polonya'da düzenlenen 'Grzegorz Olkiewicz Uluslararası Kontrabas Yarışması'nda birincilik ve 'Grzegorz Olkiewicz Grand Prix' ödülünü kazanmıştır. Bunun yanı sıra İstanbul Devlet Senfoni Orkestrası Ulusal Genç Yetenekler Yarışması'nda ikincilik derecesi elde ederek solist olarak konser vermiştir.<br><br>İzmir Devlet Senfoni Orkestrası, Cumhurbaşkanlığı Senfoni Orkestrası, Hacettepe Üniversitesi Senfoni Orkestrası, Hacettepe Üniversitesi Gençlik Senfoni Orkestrası, Eskişehir Büyükşehir Belediyesi Senfoni Orkestrası, İstanbul Devlet Senfoni Orkestrası ve Çukurova Devlet Senfoni Orkestrası eşliğinde solist olarak sahne almıştır.<br><br>2022 yılında Pan Caucasian Youth Orchestra bünyesinde yer alarak Tsinandali Festivali'ne katılmış; bu süreçte Vasily Petrenko, Charles Dutoit, Oksana Lyniv ve Claudio Vandelli gibi uluslararası alanda saygın şeflerle çalışma olanağı bulmuştur. Aynı yıl 'Pirastro Strings' tarafından düzenlenen '19th Annual Pirastro Strings Elite Soloists' programına kabul edilerek Dominik Wagner ve Jeff Braderch'in ustalık sınıflarına katılmıştır.<br><br>Eğitimi süresince çok sayıda seçkin kontrabas pedagoguyla ustalık sınıflarına aktif olarak katılan Altun, 2025 yılında Dominik Wagner tarafından Avusturya'nın Althofen kentinde düzenlenen masterclass'lara burslu olarak davet edilmiştir. Ayrıca Dorin Marc, Rinat Ibragimov, Jeff Braderch, Rick Stoijn, Xavier Foley, Catalin Rotaru, Miloslav Gajdos, Song Yi, Brendan Kane, Thomas Martin, Wang Ting Yu, David Murray, Miloslav Jelinek, Irena Olkiewicz, Einars Upatnieks, Gunars Upatnieks, Rob Dirksen, Martin Šranko, Panu Pärssinen, Jan Krigovsky, Mette Hanskov, Adam Bogacki, Waldemar Tamowski, Grzegorz Frankowski, Krzysztof Korzen, Sonia Ray, Czeslaw Zabek ve Jakub Olejnik ile çalışma şansı bulmuştur.<br><br>Sanatsal faaliyetleri kapsamında Doğuş Çocuk Senfoni Orkestrası, Ankara Gençlik Senfoni Orkestrası (AGSO), Türkiye Gençlik Filarmoni Orkestrası (TUGFO), Pan Caucasian Youth Orchestra (PCYO), Bilkent Gençlik Senfoni Orkestrası, Eskişehir Büyükşehir Belediyesi Senfoni Orkestrası, KKTC Cumhurbaşkanlığı Senfoni Orkestrası, Orkestra Akademik Başkent, Başkent Oda Orkestrası, Hacettepe Üniversitesi Gençlik Senfoni Orkestrası, Hacettepe Üniversitesi Senfoni Orkestrası ve Beta Enerji Filarmoni Orkestrası (BEFO) bünyesinde yer almıştır. Cameratalia Oda Müziği Topluluğu'nun resmî üyesi olan Altun, Antalya Oda Müziği Festivali'nin başlangıç konserlerinde de yer almıştır.<br><br>Hacettepe Üniversitesi Ankara Devlet Konservatuvarı Yaylı Çalgılar Anasanat Dalı'ndan birincilikle mezun olan Altun, eğitimine aynı kurumda Prof. Dr. Burak Karaağaç ile yüksek lisans düzeyinde devam etmektedir. 2024 yılı itibarıyla Antalya Devlet Senfoni Orkestrası'nda kontrabas sanatçısı olarak görev yapmaktadır.",
    bio_en: "Atakan Altun (born 2003) began his double bass studies in 2013 at Hacettepe University Ankara State Conservatory with Prof. Dr. Burak Karaağaç.<br><br>He launched his international career by winning first place in his category at the competition held as part of the International Double Bass Festival in Poland in 2016, and the following year received an honourable mention at the ISB (International Society of Bassists) International Double Bass Competition in the USA. In 2023 he won first prize and the 'Grzegorz Olkiewicz Grand Prix' at the 'Grzegorz Olkiewicz International Double Bass Competition' in Poland. He also won second place at the Istanbul State Symphony Orchestra National Young Talents Competition and performed as a soloist.<br><br>He has performed as soloist with the Izmir State Symphony Orchestra, Presidential Symphony Orchestra, Hacettepe University Symphony Orchestra, Hacettepe University Youth Symphony Orchestra, Eskişehir Metropolitan Municipality Symphony Orchestra, Istanbul State Symphony Orchestra and Çukurova State Symphony Orchestra.<br><br>In 2022 he participated in the Tsinandali Festival as a member of the Pan Caucasian Youth Orchestra, during which he had the opportunity to work with internationally renowned conductors including Vasily Petrenko, Charles Dutoit, Oksana Lyniv and Claudio Vandelli. That same year he was accepted into the '19th Annual Pirastro Strings Elite Soloists' programme organised by Pirastro Strings, participating in masterclasses given by Dominik Wagner and Jeff Braderch.<br><br>Having actively participated in masterclasses with numerous distinguished double bass pedagogues throughout his studies, Altun was invited on a scholarship to masterclasses organised by Dominik Wagner in Althofen, Austria in 2025. He has also had the opportunity to work with Dorin Marc, Rinat Ibragimov, Jeff Braderch, Rick Stoijn, Xavier Foley, Catalin Rotaru, Miloslav Gajdos, Song Yi, Brendan Kane, Thomas Martin, Wang Ting Yu, David Murray, Miloslav Jelinek, Irena Olkiewicz, Einars Upatnieks, Gunars Upatnieks, Rob Dirksen, Martin Šranko, Panu Pärssinen, Jan Krigovsky, Mette Hanskov, Adam Bogacki, Waldemar Tamowski, Grzegorz Frankowski, Krzysztof Korzen, Sonia Ray, Czeslaw Zabek and Jakub Olejnik.<br><br>In the course of his artistic activities he has been a member of the Doğuş Children's Symphony Orchestra, Ankara Youth Symphony Orchestra (AGSO), Turkey Youth Philharmonic Orchestra (TUGFO), Pan Caucasian Youth Orchestra (PCYO), Bilkent Youth Symphony Orchestra, Eskişehir Metropolitan Municipality Symphony Orchestra, TRNC Presidential Symphony Orchestra, Orkestra Akademik Başkent, Başkent Chamber Orchestra, Hacettepe University Youth Symphony Orchestra, Hacettepe University Symphony Orchestra and Beta Enerji Philharmonic Orchestra (BEFO). An official member of the Cameratalia Chamber Music Ensemble, he has also appeared in the opening concerts of the Antalya Chamber Music Festival.<br><br>Having graduated first in his class from the String Instruments Department of Hacettepe University Ankara State Conservatory, Altun is continuing his education at the same institution at master's level under Prof. Dr. Burak Karaağaç. Since 2024 he has been serving as a double bass artist with the Antalya State Symphony Orchestra." },
  { ad: "Büşra Başoğlu", enstruman_tr: "Kontrabas", enstruman_en: "Double Bass", foto: "photos/busra_basoglu.jpg",
    bio_tr: "2006 yılında doğan Büşra Başoğlu, 2016 yılında Hacettepe Üniversitesi Ankara Devlet Konservatuvarı giriş sınavını kazanarak Prof. Dr. Burak Karaağaç ile kontrabas eğitimine başladı. Eğitim süreci boyunca Hacettepe Gençlik Senfoni Orkestrası, Hacettepe Senfoni Orkestrası ve Türkiye Gençlik Filarmoni Orkestrası (TUGFO) bünyesinde aktif olarak konserlerde yer aldı.<br><br>Türkiye Gençlik Filarmoni Orkestrası'nda 2023, 2024 ve 2025 yıllarında grup şefi olarak görev yaptı; aynı zamanda Hacettepe Senfoni Orkestrası'nda da grup şefliği görevini sürdürmektedir.<br><br>Lise son sınıfta Hacettepe Gençlik Senfoni Orkestrası eşliğinde solist olarak sahne aldı. Lisans birinci sınıfta İzmir Devlet Senfoni Orkestrası seçmelerini kazanarak 'OMayıs Genç Kuşak Solistleri' kapsamında konser verdi. Aynı yıl Hacettepe Senfoni Orkestrası ile solist olarak konser verme hakkını da kazandı.<br><br>Halen Hacettepe Üniversitesi Ankara Devlet Konservatuvarı'nda lisans eğitimine Prof. Dr. Burak Karaağaç ile devam etmektedir.",
    bio_en: "Born in 2006, Büşra Başoğlu won the entrance examination of Hacettepe University Ankara State Conservatory in 2016 and began her double bass studies with Prof. Dr. Burak Karaağaç. Throughout her studies she has actively participated in concerts as a member of the Hacettepe Youth Symphony Orchestra, Hacettepe Symphony Orchestra and the Turkey Youth Philharmonic Orchestra (TUGFO).<br><br>She served as section leader of the Turkey Youth Philharmonic Orchestra in 2023, 2024 and 2025, and continues to hold the position of section leader in the Hacettepe Symphony Orchestra.<br><br>In her final year of secondary school she performed as soloist with the Hacettepe Youth Symphony Orchestra. In her first year of undergraduate study she won the Izmir State Symphony Orchestra auditions and performed as part of the '19 May Young Generation Soloists' series. That same year she also won the right to perform as soloist with the Hacettepe Symphony Orchestra.<br><br>She is currently continuing her undergraduate studies at Hacettepe University Ankara State Conservatory with Prof. Dr. Burak Karaağaç." },
  { ad: "İrem Yunkuş", enstruman_tr: "Piyano", enstruman_en: "Piano", foto: "photos/irem_yunkus.jpg",

function kartOlustur(s) {
  const div = document.createElement('div');
  div.className = 'sanatci-kart';
  div.onclick = () => modalAc(s);
  const fotoHTML = s.foto
    ? `<img class="kart-foto" src="${s.foto}" alt="${s.ad}">`
    : `<div class="kart-foto-placeholder">—</div>`;
  div.innerHTML = `${fotoHTML}
    <div class="kart-bilgi">
      <div class="kart-ad">${s.ad}</div>
      <div class="kart-enstruman" data-key="${s.ad}_enstruman">${currentLang === 'tr' ? s.enstruman_tr : s.enstruman_en}</div>
    </div>`;
  return div;
}

function modalAc(s) {
  document.getElementById('nk-modal-ad').textContent = s.ad;
  document.getElementById('nk-modal-enstruman').textContent = currentLang === 'tr' ? s.enstruman_tr : s.enstruman_en;
  const fotoAlani = document.getElementById('nk-modal-foto-alani');
  fotoAlani.innerHTML = s.foto
    ? `<img class="nk-modal-foto" src="${s.foto}" alt="${s.ad}">`
    : `<div class="nk-modal-foto-placeholder">—</div>`;
  const bioDiv = document.getElementById('nk-modal-bio');
  const bio = currentLang === 'tr' ? s.bio_tr : s.bio_en;
  bioDiv.innerHTML = bio.split('<br><br>').map(p => `<p>${p}</p>`).join('');
  document.getElementById('nk-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('nk-modal').dataset.sanatci = s.ad;
}

function modalKapat(e) {
  if (e.target === document.getElementById('nk-modal')) {
    document.getElementById('nk-modal').classList.remove('open');
    document.body.style.overflow = '';
  }
}

function gosterPanel(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.alt-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('[data-tr]').forEach(el => {
    const val = el.getAttribute('data-' + lang);
    if (val) el.innerHTML = val;
  });
  document.querySelectorAll('.kart-enstruman').forEach(el => {
    const key = el.dataset.key;
    const ad = key.replace('_enstruman', '');
    const s = [...icracilar, ...besteciler, ...sefler].find(x => x.ad === ad);
    if (s) el.textContent = lang === 'tr' ? s.enstruman_tr : s.enstruman_en;
  });
  const modal = document.getElementById('nk-modal');
  if (modal.classList.contains('open')) {
    const ad = modal.dataset.sanatci;
    const s = [...icracilar, ...besteciler, ...sefler].find(x => x.ad === ad);
    if (s) {
      document.getElementById('nk-modal-enstruman').textContent = lang === 'tr' ? s.enstruman_tr : s.enstruman_en;
      const bio = lang === 'tr' ? s.bio_tr : s.bio_en;
      document.getElementById('nk-modal-bio').innerHTML = bio.split('<br><br>').map(p => `<p>${p}</p>`).join('');
    }
  }
  document.documentElement.lang = lang;
}

const ig = document.getElementById('icracilar-grid');
icracilar.forEach(s => ig.appendChild(kartOlustur(s)));
const bg = document.getElementById('besteciler-grid');
besteciler.forEach(s => bg.appendChild(kartOlustur(s)));
const sg = document.getElementById('sefler-grid');
sefler.forEach(s => sg.appendChild(kartOlustur(s)));
</script>
