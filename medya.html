<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medya — Numen Kolektif</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Cormorant Garamond', Georgia, serif; background: #F5F3EE; color: #1a1a1a; position: relative; }

    .site-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: transparent;
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      z-index: 10;
    }

    .logo-group {
      display: flex; align-items: center; gap: 16px;
      flex-shrink: 0; text-decoration: none;
    }

    .site-logo {
      width: 120px; height: 120px; object-fit: contain;
      background: transparent; border-radius: 0; padding: 0;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
    }

    .site-name {
      color: white; font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px; font-weight: 600; letter-spacing: 0.06em;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    }

    .header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

    .lang-switcher { display: flex; gap: 6px; }

    .lang-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.6);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 13px; letter-spacing: 0.12em;
      padding: 4px 10px; border-radius: 3px; cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn:hover, .lang-btn.active {
      border-color: white; color: white; background: rgba(255,255,255,0.1);
    }

    .nav-tabs { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .tab {
      padding: 10px 20px; color: #1E2D7A; font-size: 15px; font-weight: 600;
      font-family: 'Cormorant Garamond', Georgia, serif;
      cursor: pointer; border: none; background: #C8D8FF; border-radius: 6px;
      letter-spacing: 0.04em; box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      white-space: nowrap; transition: background 0.15s;
      text-decoration: none; display: inline-block;
    }
    .tab:hover { background: #DDEAFF; }
    .tab.active {
      background: #DDEAFF; border-bottom: 3px solid #E07B00;
      border-radius: 6px 6px 3px 3px;
    }

    .hero-band {
      width: 100%; height: 420px;
      background: #1E2D7A url('background.jpeg') center 15% / cover no-repeat;
    }

    .content-area { max-width: 860px; margin: 0 auto; padding: 48px 40px; }

    .page-title {
      font-size: 13px; color: #1E2D7A; text-transform: uppercase;
      letter-spacing: 0.14em; font-weight: 700;
      border-left: 3px solid #C0392B; padding-left: 12px; margin-bottom: 48px;
    }

    .yapimasamasi {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 32px;
      text-align: center;
      gap: 20px;
    }

    .yapimasamasi-cizgi {
      width: 40px; height: 1px;
      background: #C0392B;
      margin-bottom: 8px;
    }

    .yapimasamasi-metin {
      font-size: 22px;
      font-style: italic;
      color: #555;
      letter-spacing: 0.03em;
      line-height: 1.6;
    }

    .site-footer { background: #1E2D7A; padding: 24px 40px; margin-top: 48px; }
    .footer-contacts { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
    .contact-row {
      display: flex; align-items: center; gap: 10px;
      color: rgba(255,255,255,0.8); font-size: 15px; text-decoration: none;
    }
    .contact-row:hover { color: white; }
    .contact-icon { width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .icon-gmail { background: white; }
    .icon-instagram { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .icon-spotify { background: #1DB954; }

    @media (max-width: 640px) {
      .site-header { padding: 14px 20px; flex-direction: column; align-items: flex-start; }
      .site-logo { width: 100px; height: 100px; }
      .site-name { font-size: 22px; }
      .nav-tabs { width: 100%; }
      .tab { padding: 8px 14px; font-size: 13px; }
      .hero-band { height: 200px; }
      .content-area { padding: 32px 20px; }
      .site-footer { padding: 20px; }
    }
  </style>
</head>

    <nav class="nav-tabs">
      <a href="sezon.html" class="tab" data-tr="2026 / 2027 Sezonu" data-en="2026 / 2027 Season">2026 / 2027 Sezonu</a>

      <a href="hikayemiz.html" class="tab" data-tr="Hikayemiz" data-en="Our Story">Hikayemiz</a>
      <a href="index.html" class="tab" data-tr="Ana Sayfa" data-en="Main Page">Ana Sayfa</a>
    </nav>
  </div>
</header>

<main class="content-area">

<footer class="site-footer">

          <path d="M1 1l6.5 5.5L14 1" stroke="#EA4335" stroke-width="1.3" fill="none"/>
        </svg>

      numenkolektif@gmail.com

    <a href="https://instagram.com/numen.kolektif" class="contact-row" target="_blank" rel="noopener">

          <circle cx="7" cy="7" r="2.8" stroke="white" stroke-width="1.2" fill="none"/>
          <circle cx="10.5" cy="3.5" r="0.8" fill="white"/>
        </svg>

    <a href="https://open.spotify.com/artist/NumenKolektif" class="contact-row" target="_blank" rel="noopener">

        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">

          <path d="M3.5 9.5c1.5-0.5 3.3-0.4 4.5 0.3" stroke="white" stroke-width="1.0" stroke-linecap="round"/>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function setLang(lang, btn) {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('[data-tr]').forEach(el => {
      const val = el.getAttribute('data-' + lang);
      if (val) el.innerHTML = val;
    });
    document.documentElement.lang = lang;
  }
</script>

</body>
